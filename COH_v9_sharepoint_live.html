/* ===========================================================
   COH OPS — Utilities
   =========================================================== */

const Utils = (() => {

  function todayISO() {
    return new Date().toISOString().slice(0, 10);
  }

  function formatDateLong(iso) {
    if (!iso) return "—";
    const d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });
  }

  function formatDateShort(iso) {
    if (!iso) return "—";
    const d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString("en-IN", { day: "2-digit", month: "short" });
  }

  function monthKey(iso) {
    return iso ? iso.slice(0, 7) : "";
  }

  function monthLabel(iso) {
    if (!iso) return "—";
    const d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString("en-IN", { month: "long", year: "numeric" });
  }

  function nowTime() {
    return new Date().toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });
  }

  function initialsOf(name) {
    if (!name) return "??";
    const cleaned = name.replace(/^(Mr\.|Mrs\.|Ms\.)\s*/i, "").trim();
    const parts = cleaned.split(/\s+/).filter(Boolean);
    return (parts[0]?.[0] || "") + (parts[1]?.[0] || "");
  }

  /** Sum numeric fields on a work log that count toward total file count, per dept schema. */
  function sumCountingFields(deptKey, fieldsObj) {
    const dept = Store.getDepartmentByKey(deptKey);
    if (!dept) return 0;
    let total = 0;
    dept.fields.forEach(f => {
      if (f.countsTowardTotal && f.type === "number") {
        const v = parseFloat(fieldsObj[f.id]);
        if (!isNaN(v)) total += v;
      }
    });
    return total;
  }

  /** Compute productivity % for a log, honoring the per-department rule. */
  function targetForDepartment(deptKey, employee) {
    if (!employee) return null;
    const dept = Store.getDepartmentByKey(deptKey);
    let target = null;
    if (dept && employee.departmentTargets) {
      target = employee.departmentTargets[dept.name] || null;
    }
    if (!target) {
      if (deptKey === "cash-verification") {
        target = employee.targetCountCashVerification || employee.targetCount;
      } else {
        target = employee.targetCount;
      }
    }
    return target || null;
  }

  /** Compute productivity % for a log, honoring the per-department rule. */
  function computeProductivity(deptKey, totalFileDone, employee) {
    if (!employee || totalFileDone === null || totalFileDone === undefined) return null;
    const target = targetForDepartment(deptKey, employee);
    if (!target || target <= 0) return null;
    return Math.round((totalFileDone / target) * 1000) / 10;
  }

  function computedWorkingMinutes(deptKey, totalFileDone, employee, fieldsObj = null) {
    const dept = Store.getDepartmentByKey(deptKey);
    if (dept && fieldsObj) {
      let taskMinutes = 0;
      dept.fields.forEach(field => {
        if (field.type !== "number") return;
        const minutesPerUnit = Store.getTaskTimeRule(deptKey, field.id);
        const value = parseFloat(fieldsObj[field.id]);
        if (minutesPerUnit !== null && !isNaN(value)) {
          taskMinutes += value * minutesPerUnit;
        }
      });
      if (taskMinutes > 0) return Math.round(taskMinutes);
    }
    const target = targetForDepartment(deptKey, employee);
    if (!target || target <= 0 || totalFileDone === null || totalFileDone === undefined) return null;
    return Math.round((Number(totalFileDone) / Number(target)) * 480);
  }

  function productivityTone(pct) {
    if (pct === null || pct === undefined) return "amber";
    if (pct >= 80) return "sage";
    if (pct >= 50) return "amber";
    return "rust";
  }

  function escapeHtml(str) {
    if (str === null || str === undefined) return "";
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function minutesToHM(min) {
    if (min === null || min === undefined) return "—";
    const h = Math.floor(min / 60);
    const m = Math.round(min % 60);
    return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
  }

  function hmToMinutes(val) {
    if (val === null || val === undefined || val === "") return null;
    if (typeof val === "number" && !isNaN(val)) return Math.round(val);
    const text = String(val).trim();
    const hm = text.match(/^(\d{1,3}):(\d{2})$/);
    if (hm) return parseInt(hm[1], 10) * 60 + parseInt(hm[2], 10);
    const numeric = parseFloat(text);
    return isNaN(numeric) ? null : Math.round(numeric);
  }

  function uniq(arr) {
    return [...new Set(arr)];
  }

  function downloadCSV(filename, rows) {
    const csv = rows.map(r => r.map(cell => {
      const s = (cell === null || cell === undefined) ? "" : String(cell);
      return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    }).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  return {
    todayISO, formatDateLong, formatDateShort, monthKey, monthLabel, nowTime,
    initialsOf, sumCountingFields, targetForDepartment, computeProductivity, computedWorkingMinutes, productivityTone,
    escapeHtml, minutesToHM, hmToMinutes, uniq, downloadCSV
  };
})();

   =========================================================== */

const Toast = (() => {
  let container = null;

  function ensureContainer() {
    if (!container) {
      container = document.createElement("div");
      container.className = "toast-stack";
      document.body.appendChild(container);
    }
    return container;
  }

  function show(message, type = "default", duration = 3200) {
    const el = document.createElement("div");
    el.className = `toast ${type === "error" ? "toast--error" : type === "success" ? "toast--success" : ""}`;
    el.textContent = message;
    ensureContainer().appendChild(el);
    setTimeout(() => {
      el.style.transition = "opacity 0.25s, transform 0.25s";
      el.style.opacity = "0";
      el.style.transform = "translateY(8px)";
      setTimeout(() => el.remove(), 250);
    }, duration);
  }

  return {
    success: (msg) => show(msg, "success"),
    error: (msg) => show(msg, "error"),
    info: (msg) => show(msg, "default")
  };
})();

                  <span>${d.name}</span>
                </div>
              `).join("")}
            </div>
          </div>
        </div>
      </div>

    initCombo(employees);
    document.getElementById("login-form").addEventListener("submit", handleSubmit);
    document.getElementById("btn-admin-login").addEventListener("click", renderAdminLogin);

    const switchBtn = document.getElementById("btn-switch-m365");
    if (switchBtn) {
      switchBtn.addEventListener("click", () => {
        // logoutRedirect() navigates away to Microsoft to end this session,
        // then redirects back here. On return, MSALAuth.isLoggedIn() is false,
        // so the app shows the "Sign in with Microsoft 365" screen again —
        // Microsoft's own account picker (prompt: select_account) lets the
        // person choose a different account from there.
        switchBtn.textContent = "Signing out…";
        switchBtn.disabled = true;
        MSALAuth.logout();
      });
    }
  }

    document.getElementById("btn-back-employee-login").addEventListener("click", render);
    document.getElementById("admin-login-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const id = document.getElementById("admin-id").value.trim().toUpperCase();
      const pass = document.getElementById("admin-pass").value;
      const errorEl = document.getElementById("admin-login-error");

      // Admin credentials now live in SharePoint (EMPLOGINDATA), same as every
      // other employee — there is no hardcoded admin password. To grant admin
      // access, add/edit a row in EMPLOGINDATA with Role = "Admin" and set its
      // EMPLOYEE_ID and EMP_PASSWORD as you would for any employee.
      const admin = Store.getEmployees().find(emp =>
        emp.id.toUpperCase() === id && emp.role === "Admin"
      );

      if (!admin || admin.password !== pass) {
        errorEl.textContent = "Incorrect admin ID or password.";
        errorEl.style.display = "block";
        return;
      }
      errorEl.style.display = "none";
      Store.setSession(admin);
      Toast.success("Admin signed in.");
      App.boot();
    });
  }

  function initCombo(employees) {
    const searchInput = document.getElementById("login-id-search");
    const hiddenInput = document.getElementById("login-id-value");
    const dropdown = document.getElementById("combo-dropdown");
    const preview = document.getElementById("login-id-preview");
    const arrow = document.getElementById("combo-arrow");
    let activeIdx = -1;
    let isOpen = false;

    function getFiltered(query) {
      const q = query.trim().toLowerCase();
      if (!q) return employees;
      return employees.filter(e =>
        e.id.toLowerCase().includes(q) ||
        e.name.toLowerCase().includes(q) ||
        (e.designation || "").toLowerCase().includes(q)
      );
    }

    function renderDropdown(query) {
      const results = getFiltered(query);
      activeIdx = -1;
      if (!results.length) {
        dropdown.innerHTML = `<div class="emp-combo__no-results">No employee found</div>`;
      } else {
        dropdown.innerHTML = results.map((e, i) => {
          const depts = e.departments && e.departments.length ? e.departments : (e.department ? [e.department] : []);
          const deptStr = depts.slice(0, 2).join(", ") + (depts.length > 2 ? "…" : "");
          const roleBadge = e.role !== "Employee"
            ? `<span class="emp-combo__role-badge">${e.role}</span>` : "";
          const initials = Utils.initialsOf(e.name);
          const photoSrc = e._photoBlobUrl || e.photoUrl;
          const avatarHtml = photoSrc
            ? `<img src="${Utils.escapeHtml(photoSrc)}" alt="${Utils.escapeHtml(e.name)}"
                 style="width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
               <div style="display:none;width:100%;height:100%;align-items:center;justify-content:center;">${initials}</div>`
            : initials;
          return `
            <div class="emp-combo__item" data-id="${Utils.escapeHtml(e.id)}" data-name="${Utils.escapeHtml(e.name)}" data-idx="${i}">
              <div class="emp-combo__avatar">${avatarHtml}</div>
              <div class="emp-combo__info">
                <div class="emp-combo__name">${Utils.escapeHtml(e.name)} ${roleBadge}</div>
                <div class="emp-combo__meta"><span class="emp-combo__code">${e.id}</span>${deptStr ? ' · ' + Utils.escapeHtml(deptStr) : ''}</div>
              </div>
            </div>
          `;
        }).join("");
      }
      dropdown.style.display = "block";
      isOpen = true;
      arrow.innerHTML = "&#9650;";

      dropdown.querySelectorAll(".emp-combo__item").forEach(item => {
        item.addEventListener("mousedown", (ev) => {
          ev.preventDefault();
          selectEmployee(item.dataset.id, item.dataset.name);
        });
      });
    }

    function selectEmployee(id, name) {
      hiddenInput.value = id;
      searchInput.value = `${id} — ${name}`;
      dropdown.style.display = "none";
      isOpen = false;
      arrow.innerHTML = "&#9660;";
      activeIdx = -1;
      // Show preview card
      const emp = Store.getEmployees().find(e => e.id === id);
      if (emp) {
        const depts = emp.departments && emp.departments.length ? emp.departments : (emp.department ? [emp.department] : []);
        preview.innerHTML = `
          <div style="display:flex; align-items:center; gap:10px;">
            <div class="emp-combo__avatar emp-combo__avatar--lg">${Utils.initialsOf(emp.name)}</div>
            <div>
              <div style="font-weight:700; font-size:13.5px;">${Utils.escapeHtml(emp.name)}</div>
              <div style="font-size:12px; color:var(--ink-soft);">${Utils.escapeHtml(emp.designation || "")}${depts.length ? ' · ' + depts.join(", ") : ''}</div>
            </div>
          </div>
        `;
        preview.style.display = "block";
      }
      // Focus password field
      document.getElementById("login-pass").focus();
    }

    function closeDropdown() {
      dropdown.style.display = "none";
      isOpen = false;
      arrow.innerHTML = "&#9660;";
      activeIdx = -1;
    }

    searchInput.addEventListener("focus", () => {
      renderDropdown(searchInput.value);
    });

    searchInput.addEventListener("input", () => {
      hiddenInput.value = "";
      preview.style.display = "none";
      renderDropdown(searchInput.value);
    });

    searchInput.addEventListener("keydown", (e) => {
      if (!isOpen) return;
      const items = dropdown.querySelectorAll(".emp-combo__item");
      if (e.key === "ArrowDown") {
        e.preventDefault();
        activeIdx = Math.min(activeIdx + 1, items.length - 1);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        activeIdx = Math.max(activeIdx - 1, 0);
      } else if (e.key === "Enter") {
        e.preventDefault();
        if (activeIdx >= 0 && items[activeIdx]) {
          const item = items[activeIdx];
          selectEmployee(item.dataset.id, item.dataset.name);
        }
        return;
      } else if (e.key === "Escape") {
        closeDropdown();
        return;
      }
      items.forEach((item, i) => item.classList.toggle("emp-combo__item--active", i === activeIdx));
      if (items[activeIdx]) items[activeIdx].scrollIntoView({ block: "nearest" });
    });

    arrow.addEventListener("click", () => {
      if (isOpen) { closeDropdown(); } else { searchInput.focus(); renderDropdown(searchInput.value); }
    });

    document.addEventListener("click", (e) => {
      if (!document.getElementById("emp-combo")?.contains(e.target)) closeDropdown();
    }, { capture: true });
  }

  function handleSubmit(e) {
    e.preventDefault();
    const id = document.getElementById("login-id-value").value.trim().toUpperCase()
      || document.getElementById("login-id-search").value.trim().toUpperCase();
    const pass = document.getElementById("login-pass").value;
    const errorEl = document.getElementById("login-error");

    const emp = Store.getEmployees().find(e => e.id.toUpperCase() === id);

    if (!emp) {
      errorEl.textContent = "Please select a valid employee from the dropdown.";
      errorEl.style.display = "block";
      return;
    }

    if (emp.password !== pass) {
      errorEl.textContent = "Incorrect password for this employee ID.";
      errorEl.style.display = "block";
      return;
    }

    errorEl.style.display = "none";
    Store.setSession(emp);

    // Record whichever Microsoft 365 account is currently signed in as this
    // employee's Official_mail in SharePoint — always overwrites with the
    // latest sign-in. There is no requirement that this match any previous
    // value; anyone with the correct GU ID + password may sign in with any
    // Microsoft 365 account, and that account becomes the one on file.
    if (MSALAuth.isLoggedIn()) {
      const msAccount = MSALAuth.getAccount();
      const msEmail = (msAccount?.username || "").trim();
      if (msEmail) Store.updateOfficialMail(emp.id, msEmail).catch(() => {});
    }

    Toast.success(`Welcome back, ${emp.name.split(" ")[0]}.`);
    App.boot();
  }

  return { render };
})();

/* ===========================================================

const EmployeeDashboardView = (() => {

  function render(container, user) {
    const allLogs = Store.getWorkLogsByEmployee(user.id);
    const thisMonth = Utils.monthKey(Utils.todayISO());
    const monthLogs = allLogs.filter(l => Utils.monthKey(l.date) === thisMonth);

    const filesThisMonth = monthLogs.reduce((sum, l) => sum + (l.totalFileDone || Utils.sumCountingFields(l.departmentKey, l.fields)), 0);
    const validProdLogs = monthLogs.filter(l => l.productivityPct !== null && l.productivityPct !== undefined);
    const avgProductivity = validProdLogs.length
      ? Math.round((validProdLogs.reduce((s, l) => s + l.productivityPct, 0) / validProdLogs.length) * 10) / 10
      : null;
    const pendingApprovals = allLogs.filter(l => l.approvalStatus === "Pending").length;
    const todayLog = allLogs.find(l => l.date === Utils.todayISO());

    const dept = Store.getDepartmentByName(user.department);

    container.innerHTML = `
      <div class="content__header">
        <div>
          <div class="content__eyebrow">My Dashboard</div>
          <h1>Good day, ${Utils.escapeHtml(user.name.split(" ").slice(-1)[0] || user.name)}</h1>
          <p class="content__desc">${
            (user.departments && user.departments.length > 1)
              ? user.departments.join(" · ") + ' · '
              : (user.department ? `${Utils.escapeHtml(user.department)} · ` : "")
          }${Utils.escapeHtml(user.designation || "")}</p>
        </div>
        <button class="btn btn--primary" id="btn-go-log-work">+ Log today's work</button>
      </div>

      <div class="stat-grid">
        <div class="stat-card stat-card--accent-brand">
          <div class="stat-card__label">Files this month</div>
          <div class="stat-card__value num">${filesThisMonth}</div>
          <div class="stat-card__hint">${Utils.monthLabel(Utils.todayISO())}</div>
        </div>
        <div class="stat-card stat-card--accent-${avgProductivity === null ? 'amber' : Utils.productivityTone(avgProductivity)}">
          <div class="stat-card__label">Avg productivity</div>
          <div class="stat-card__value num">${avgProductivity !== null ? avgProductivity + "%" : "—"}</div>
          <div class="stat-card__hint">Across ${validProdLogs.length} logged day${validProdLogs.length === 1 ? "" : "s"}</div>
        </div>
        <div class="stat-card stat-card--accent-amber">
          <div class="stat-card__label">Pending approvals</div>
          <div class="stat-card__value num">${pendingApprovals}</div>
          <div class="stat-card__hint">Awaiting manager review</div>
        </div>
        <div class="stat-card stat-card--accent-${todayLog ? 'sage' : 'rust'}">
          <div class="stat-card__label">Today's status</div>
          <div class="stat-card__value" style="font-size:18px;">${todayLog ? "Logged" : "Not logged"}</div>
          <div class="stat-card__hint">${user.attendanceStatus || "Present"} · ${Utils.formatDateShort(Utils.todayISO())}</div>
        </div>
      </div>

      <div class="card card--pad" style="margin-bottom:22px;">
        <h2 style="margin-bottom:4px;">Last 14 days — Total File Done</h2>
        <p class="content__desc" style="margin-bottom:18px;">A quick look at your daily output trend.</p>
        <div id="chart-area"></div>
      </div>

      <div class="card card--pad">
        <h2 style="margin-bottom:14px;">Recent entries</h2>
        ${renderRecentTable(allLogs.slice(0, 6))}
      </div>
    `;

    document.getElementById("btn-go-log-work").addEventListener("click", () => App.navigate("log-work"));
    renderChart(allLogs);
  }

  function renderRecentTable(logs) {
    if (!logs.length) {
      return `<div class="empty-state"><div class="empty-state__icon">&#128203;</div><h3>No entries yet</h3><p>Log your first day's work to see it here.</p></div>`;
    }
    return `
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Department</th><th>Files done</th><th>Productivity</th><th>Status</th></tr></thead>
          <tbody>
            ${logs.map(l => `
              <tr>
                <td>${Utils.formatDateLong(l.date)}</td>
                <td><span class="dept-chip" style="--chip-bg:${Store.deptColor(l.departmentKey)}22;--chip-fg:${Store.deptColor(l.departmentKey)}"><span class="dept-chip__dot"></span>${Utils.escapeHtml(l.departmentName || "—")}</span></td>
                <td class="num">${l.totalFileDone ?? "—"}</td>
                <td class="num">${l.productivityPct !== null && l.productivityPct !== undefined ? l.productivityPct + "%" : "—"}</td>
                <td>${statusChip(l.approvalStatus)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    `;
  }

  function statusChip(status) {
    const cls = status === "Approved" ? "approved" : status === "Rejected" ? "rejected" : "pending";
    return `<span class="status-chip status-chip--${cls}">${status}</span>`;
  }

  function renderChart(logs) {
    const sorted = [...logs].sort((a, b) => a.date.localeCompare(b.date)).slice(-14);
    const max = Math.max(1, ...sorted.map(l => l.totalFileDone || 0));
    const w = 700, h = 190, barGap = 6;
    const topPad = 22, bottomPad = 26;
    const barW = sorted.length ? (w - (sorted.length - 1) * barGap) / sorted.length : 20;

    if (!sorted.length) {
      document.getElementById("chart-area").innerHTML = `<div class="empty-state" style="padding:30px;"><p>No data yet to chart.</p></div>`;
      return;
    }

    const bars = sorted.map((l, i) => {
      const val = l.totalFileDone || 0;
      const barH = Math.max(3, (val / max) * (h - topPad - bottomPad));
      const x = i * (barW + barGap);
      const y = h - bottomPad - barH;
      return `
        <g>
          <rect x="${x}" y="${y}" width="${barW}" height="${barH}" rx="3" fill="var(--brand)" opacity="0.88"></rect>
          <text x="${x + barW / 2}" y="${h - 8}" font-size="9" text-anchor="middle" fill="var(--ink-soft)" font-family="var(--font-mono)">${Utils.formatDateShort(l.date)}</text>
          <text x="${x + barW / 2}" y="${Math.max(12, y - 5)}" font-size="10" text-anchor="middle" fill="var(--ink)" font-family="var(--font-mono)" font-weight="700">${val}</text>
        </g>
      `;
    }).join("");

    document.getElementById("chart-area").innerHTML = `
      <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:200px;" preserveAspectRatio="xMinYMin meet">${bars}</svg>
    `;
  }

  return { render };
})();

/* ===========================================================

   fields defined in DEPARTMENT_SCHEMA for that department.

const LogWorkView = (() => {

  let currentDeptKey = null;
  let editingLogId = null;
  let formData = {};

  function render(container, user, params) {
    const newLogId = params && params.logId ? params.logId : null;

    // Guard: if the user is already actively filling in this form (same context),
    // do NOT re-initialise formData or currentDeptKey — that would wipe their work.
    const isAlreadyActive = container.querySelector && container.querySelector(".dept-field-input") !== null;
    const isSameContext = isAlreadyActive && newLogId === editingLogId;
    if (isSameContext) {
      // Silently skip the re-render — the form is already live with user's data intact.
      return;
    }

    editingLogId = newLogId;
    const editingLog = editingLogId ? Store.getWorkLogById(editingLogId) : null;

    currentDeptKey = editingLog ? editingLog.departmentKey
      : (user.department ? (Store.getDepartmentByName(user.department) || {}).key : null);
    formData = editingLog ? { ...editingLog.fields } : {};

    const isManagerEntry = user.role === "Manager" || user.role === "Chief Manager";
    // For employees, only show their assigned departments
    const allDepartments = Store.getDepartments();
    const departments = isManagerEntry ? allDepartments : allDepartments.filter(d =>
      (user.departments && user.departments.includes(d.name)) || d.name === user.department
    );

    // ---- Self-entry summary data (employee only) ----
    const myLogs = !isManagerEntry ? Store.getWorkLogsByEmployee(user.id) : [];
    const thisMonthKey = Utils.monthKey(Utils.todayISO());
    const myMonthLogs = myLogs.filter(l => Utils.monthKey(l.date) === thisMonthKey);
    const myTotalFilesMonth = myMonthLogs.reduce((s, l) => s + (l.totalFileDone || 0), 0);
    const myEntriesMonth = myMonthLogs.length;
    const myEntriesAllTime = myLogs.length;

    container.innerHTML = `
      <div class="content__header">
        <div>
          <div class="content__eyebrow">${editingLog ? "Edit Entry" : "Log Work"}</div>
          <h1>${editingLog ? "Update work entry" : "Today's work log"}</h1>
          <p class="content__desc">Pick a department and fill in the day's task counts — productivity is calculated automatically.</p>
        </div>
      </div>

      ${!isManagerEntry ? `
        <div class="card card--pad" style="margin-bottom:18px; border-left:4px solid var(--brand);">
          <div style="display:flex; align-items:center; justify-content:space-between; gap:18px; flex-wrap:wrap;">
            <div>
              <div class="field__label" style="margin-bottom:8px;">Total Working Hours (HH:MM)</div>
              <input type="text" id="lw-working-hours" readonly placeholder="Auto" style="max-width:180px; font-size:18px; font-family:var(--font-mono); font-weight:700; text-align:center;" value="${editingLog && editingLog.totalWorkingMinutes ? Utils.minutesToHM(editingLog.totalWorkingMinutes) : ''}">
            </div>
            <div style="font-size:12.5px; color:var(--ink-soft); max-width:320px;">Auto-calculated from files done against the department target and saved to SharePoint.</div>
          </div>
        </div>
      ` : ""}

      <div class="${!isManagerEntry ? 'lw-layout' : ''}">
        <div class="card card--pad">
          <form id="log-work-form">
            <div class="field-grid" style="margin-bottom:18px;">
              <div class="field">
                <label class="field__label">Date<span class="req">*</span></label>
                <input type="date" id="lw-date" value="${editingLog ? editingLog.date : Utils.todayISO()}" required>
              </div>
              ${isManagerEntry ? `
                <div class="field">
                  <label class="field__label">Employee<span class="req">*</span></label>
                  <select id="lw-employee" required>
                    <option value="">Select employee…</option>
                    ${Store.getEmployees().filter(e => e.role === "Employee").map(e =>
                      `<option value="${e.id}" ${editingLog && editingLog.employeeId === e.id ? "selected" : ""}>${Utils.escapeHtml(e.name)} (${e.id})</option>`
                    ).join("")}
                  </select>
                </div>
              ` : ""}
              <div class="field">
                <label class="field__label">Department<span class="req">*</span></label>
                <select id="lw-department" required>
                  <option value="">Select department…</option>
                  ${departments.map(d => `<option value="${d.key}" ${currentDeptKey === d.key ? "selected" : ""}>${d.name}</option>`).join("")}
                </select>
              </div>
            </div>

            <div class="divider"></div>

            <div id="dept-fields-area"></div>

            <div class="divider"></div>

            <div class="card--pad" style="background:var(--brand-tint); border-radius:var(--radius-md); padding:16px 18px; margin-bottom:18px;">
              <div class="kv-row">
                <span class="kv-row__label">Total File Done (auto-summed)</span>
                <span class="kv-row__value num" id="lw-total-files">0</span>
              </div>
              <div class="kv-row">
                <span class="kv-row__label">Target count</span>
                <span class="kv-row__value num" id="lw-target">—</span>
              </div>
              <div class="kv-row">
                <span class="kv-row__label">Productivity %</span>
                <span class="kv-row__value num" id="lw-productivity">—</span>
              </div>
            </div>

            ${isManagerEntry ? `
              <div class="field-grid" style="margin-bottom:18px;">
                <div class="field">
                  <label class="field__label">Total Working Hours (HH:MM)</label>
                  <input type="text" id="lw-working-hours" readonly placeholder="Auto" value="${editingLog && editingLog.totalWorkingMinutes ? Utils.minutesToHM(editingLog.totalWorkingMinutes) : ''}">
                </div>
              </div>
            ` : ""}

            <div style="display:flex; gap:10px; justify-content:flex-end;">
              <button type="button" class="btn btn--ghost" id="lw-cancel">Cancel</button>
              <button type="submit" class="btn btn--primary">${editingLog ? "Save changes" : "Submit work log"}</button>

          </form>
        </div>

        ${!isManagerEntry ? `
          <aside class="lw-side">
            <div class="card card--pad lw-side__card">
              <h3 style="margin-bottom:12px;">Quick lookup</h3>

              <div class="lw-side__stats">
                <div class="lw-side__stat">
                  <div class="lw-side__stat-value num">${myEntriesMonth}</div>
                  <div class="lw-side__stat-label">Entries this month</div>
                </div>
                <div class="lw-side__stat">
                  <div class="lw-side__stat-value num">${myTotalFilesMonth}</div>
                  <div class="lw-side__stat-label">Files done this month</div>
                </div>
                <div class="lw-side__stat">
                  <div class="lw-side__stat-value num">${myEntriesAllTime}</div>
                  <div class="lw-side__stat-label">Total entries logged</div>
                </div>
              </div>
            </div>

            <div class="card card--pad lw-side__card">
              <h3 style="margin-bottom:4px;">This entry, live</h3>
              <p class="content__desc" style="margin-bottom:12px; font-size:12px;">Updates as you fill in the form.</p>
              <div class="kv-row">
                <span class="kv-row__label">Total File Done</span>
                <span class="kv-row__value num" id="lw-side-total-files">0</span>
              </div>
              <div class="kv-row">
                <span class="kv-row__label">Target count</span>
                <span class="kv-row__value num" id="lw-side-target">—</span>
              </div>
              <div class="kv-row">
                <span class="kv-row__label">Productivity %</span>
                <span class="kv-row__value num" id="lw-side-productivity">—</span>
              </div>
            </div>

            <div class="card card--pad lw-side__card">
              <h3 style="margin-bottom:12px;">Recent entries</h3>
              ${renderShortcutList(myLogs.slice(0, 6))}
            </div>
          </aside>
        ` : ""}
      </div>
    `;

    document.getElementById("lw-department").addEventListener("change", (e) => {
      currentDeptKey = e.target.value || null;
      formData = {};
      renderDeptFields(user);
    });

    if (isManagerEntry) {
      document.getElementById("lw-employee").addEventListener("change", (e) => {
        recalc(user);
        // Re-filter department dropdown by selected employee's assigned depts
        const empId = e.target.value;
        const selEmp = empId ? Store.getEmployeeById(empId) : null;
        const deptSel = document.getElementById("lw-department");
        if (selEmp) {
          const empDepts = selEmp.departments || (selEmp.department ? [selEmp.department] : []);
          [...deptSel.options].forEach(opt => {
            if (!opt.value) return; // keep placeholder
            opt.hidden = empDepts.length > 0 && !empDepts.includes(opt.text);
          });
          // If current selection is now hidden, reset
          const curOpt = deptSel.options[deptSel.selectedIndex];
          if (curOpt && curOpt.hidden) { deptSel.value = ""; currentDeptKey = null; formData = {}; renderDeptFields(user); }
        } else {
          [...deptSel.options].forEach(opt => { opt.hidden = false; });
        }
      });
    }

    if (!isManagerEntry) {
      const sideDatePick = document.getElementById("lw-side-datepick");
      const mainDate = document.getElementById("lw-date");
      sideDatePick.addEventListener("change", () => { mainDate.value = sideDatePick.value; });
      mainDate.addEventListener("change", () => { sideDatePick.value = mainDate.value; });
    }

    document.getElementById("lw-cancel").addEventListener("click", () => App.navigate(isManagerEntry ? "manager-dashboard" : "dashboard"));
    document.getElementById("log-work-form").addEventListener("submit", (e) => handleSubmit(e, user, isManagerEntry));

    renderDeptFields(user);
  }

  function renderShortcutList(logs) {
    if (!logs.length) {
      return `<div class="empty-state" style="padding:16px 8px;"><p style="font-size:12.5px; margin:0;">No entries yet.</p></div>`;
    }
    return `
      <div style="display:flex; flex-direction:column; gap:8px;">
        ${logs.map(l => `
          <div style="display:flex; align-items:center; justify-content:space-between; gap:8px; padding:8px 10px; background:var(--paper); border-radius:var(--radius-sm); border:1px solid var(--paper-line);">
            <div style="min-width:0;">
              <div style="font-size:12px; font-weight:700; color:var(--ink);">${Utils.formatDateShort(l.date)}</div>
              <div style="font-size:11px; color:var(--ink-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${Utils.escapeHtml(l.departmentName || "—")}</div>
            </div>
            <div style="text-align:right; flex-shrink:0;">
              <div class="num" style="font-size:13px; font-weight:700;">${l.totalFileDone ?? "—"}</div>
              <div style="font-size:10px; color:var(--ink-soft);">files</div>
            </div>
          </div>
        `).join("")}
      </div>
    `;
  }

  function targetEmployee(user, isManagerEntry) {
    if (!isManagerEntry) return user;
    const sel = document.getElementById("lw-employee");
    const empId = sel ? sel.value : null;
    return empId ? Store.getEmployeeById(empId) : null;
  }

  function renderDeptFields(user) {
    const area = document.getElementById("dept-fields-area");
    if (!currentDeptKey) {
      area.innerHTML = `<div class="empty-state" style="padding:30px;"><p>Select a department above to load its task fields.</p></div>`;
      updateTotals(user, document.getElementById("lw-employee") != null);
      return;
    }
    const dept = Store.getDepartmentByKey(currentDeptKey);
    area.innerHTML = `
      <h3 style="margin-bottom:14px; color:${dept.color};">${dept.name} — Task Entry</h3>
      <div class="field-grid">
        ${dept.fields.map(f => `
          <div class="field">
            <label class="field__label">${f.label}${f.countsTowardTotal ? '<span class="req">*</span>' : ''}</label>
            ${f.type === "number"
              ? `<input type="number" min="0" step="1" class="dept-field-input" data-field="${f.id}" data-counts="${f.countsTowardTotal}" placeholder="0" value="${formData[f.id] ?? (f.default ?? '')}">`
              : `<textarea class="dept-field-input" data-field="${f.id}" data-counts="false" placeholder="Optional notes…">${formData[f.id] ?? ""}</textarea>`
            }
          </div>
        `).join("")}
      </div>
    `;

    area.querySelectorAll(".dept-field-input").forEach(input => {
      input.addEventListener("input", () => {
        formData[input.dataset.field] = input.value;
        updateTotals(user, document.getElementById("lw-employee") != null);
      });
    });

    updateTotals(user, document.getElementById("lw-employee") != null);
  }

  function updateTotals(user, isManagerEntry) {
    const emp = targetEmployee(user, isManagerEntry) || user;
    const total = currentDeptKey ? Utils.sumCountingFields(currentDeptKey, formData) : 0;
    document.getElementById("lw-total-files").textContent = total;

    const target = Utils.targetForDepartment(currentDeptKey, emp);
    document.getElementById("lw-target").textContent = target ?? "Not set";

    const productivity = (emp && target) ? Utils.computeProductivity(currentDeptKey, total, emp) : null;
    const prodEl = document.getElementById("lw-productivity");
    prodEl.textContent = productivity !== null ? productivity + "%" : "—";
    prodEl.style.color = productivity !== null ? `var(--${Utils.productivityTone(productivity) === 'sage' ? 'sage' : Utils.productivityTone(productivity) === 'amber' ? 'amber' : 'rust'})` : "";

    // Mirror into side panel, if present (employee self-entry view)
    const sideTotalEl = document.getElementById("lw-side-total-files");
    if (sideTotalEl) {
      sideTotalEl.textContent = total;
      document.getElementById("lw-side-target").textContent = target ?? "Not set";
      const sideProdEl = document.getElementById("lw-side-productivity");
      sideProdEl.textContent = productivity !== null ? productivity + "%" : "—";
      sideProdEl.style.color = prodEl.style.color;
    }

    const workingMinutes = Utils.computedWorkingMinutes(currentDeptKey, total, emp, formData);
    const workingInput = document.getElementById("lw-working-hours");
    if (workingInput) workingInput.value = workingMinutes !== null ? Utils.minutesToHM(workingMinutes) : "";
  }

  function recalc(user) {
    updateTotals(user, true);
  }

  function parseHMtoMinutes(val) {
    if (!val) return null;
    const m = val.match(/^(\d{1,2}):(\d{2})$/);
    if (!m) return null;
    return parseInt(m[1], 10) * 60 + parseInt(m[2], 10);
  }

  async function handleSubmit(e, user, isManagerEntry) {
    e.preventDefault();

    if (!currentDeptKey) {
      Toast.error("Please select a department.");
      return;
    }

    const employee = isManagerEntry ? targetEmployee(user, true) : user;
    if (isManagerEntry && !employee) {
      Toast.error("Please select an employee.");
      return;
    }

    const dept = Store.getDepartmentByKey(currentDeptKey);
    const requiredMissing = dept.fields.some(f => f.countsTowardTotal && f.type === "number" && (formData[f.id] === undefined || formData[f.id] === ""));
    if (requiredMissing) {
      Toast.error("Please fill in all required count fields (marked with *).");
      return;
    }

    const date = document.getElementById("lw-date").value;
    const totalFileDone = Utils.sumCountingFields(currentDeptKey, formData);
    const productivityPct = Utils.computeProductivity(currentDeptKey, totalFileDone, employee);
    const workingMinutes = Utils.computedWorkingMinutes(currentDeptKey, totalFileDone, employee, formData);

    const log = {
      id: editingLogId || Store.nextWorkLogId(),
      employeeId: employee.id,
      employeeName: employee.name,
      date,
      departmentKey: currentDeptKey,
      departmentName: dept.name,
      designation: employee.designation,
      totalFileDone,
      fields: { ...formData },
      totalWorkingMinutes: workingMinutes,
      productivityPct,
      approvalStatus: editingLogId ? (Store.getWorkLogById(editingLogId).approvalStatus) : "Pending",
      createdAt: editingLogId ? Store.getWorkLogById(editingLogId).createdAt : new Date().toISOString()
    };

    try {
      const saved = await Store.saveWorkLog(log);
      Toast.success(editingLogId ? "Work log updated in SharePoint." : "Work log submitted to SharePoint.");
      if (saved && saved._saveWarnings && saved._saveWarnings.length) {
        const n = saved._saveWarnings.length;
        Toast.info(`Note: ${n} field${n > 1 ? "s" : ""} could not be saved to SharePoint (column may be read-only or unsupported). Everything else saved.`);
      }
      App.navigate(isManagerEntry ? "manager-dashboard" : "dashboard");
    } catch (err) {
      Toast.error("Save failed: " + err.message);
    }
  }

  return { render };
})();

const HistoryView = (() => {

  let filters = { month: "all", department: "all", employee: "all" };

  function render(container, user) {
    const isPrivileged = user.role === "Manager" || user.role === "Chief Manager";
    const allLogs = isPrivileged ? Store.getWorkLogs() : Store.getWorkLogsByEmployee(user.id);

    const months = Utils.uniq(allLogs.map(l => Utils.monthKey(l.date))).sort().reverse();
    // Employees only see their assigned departments; managers see all
    const allDepts = Store.getDepartments();
    const depts = isPrivileged ? allDepts : allDepts.filter(d =>
      (user.departments && user.departments.includes(d.name)) || d.name === user.department
    );

    container.innerHTML = `
      <div class="content__header">
        <div>
          <div class="content__eyebrow">${isPrivileged ? "All Work History" : "Work History"}</div>
          <h1>Filter and review entries</h1>
        </div>
        <button class="btn btn--ghost" id="btn-export-csv">Export CSV</button>
      </div>

      <div class="card card--pad" style="margin-bottom:18px;">
        <div class="field-grid">
          <div class="field" style="margin-bottom:0;">
            <label class="field__label">Month</label>
            <select id="filter-month">
              <option value="all">All months</option>
              ${months.map(m => `<option value="${m}">${Utils.monthLabel(m + "-01")}</option>`).join("")}
            </select>
          </div>
          <div class="field" style="margin-bottom:0;">
            <label class="field__label">Department</label>
            <select id="filter-department">
              <option value="all">All departments</option>
              ${depts.map(d => `<option value="${d.key}">${d.name}</option>`).join("")}
            </select>
          </div>
          ${isPrivileged ? `
            <div class="field" style="margin-bottom:0;">
              <label class="field__label">Employee</label>
              <select id="filter-employee">
                <option value="all">All employees</option>
                ${Store.getEmployees().map(e => `<option value="${e.id}">${Utils.escapeHtml(e.name)}</option>`).join("")}
              </select>
            </div>
          ` : ""}
        </div>
      </div>

      <div class="card card--pad">
        <div id="history-table-area"></div>
      </div>
    `;

    document.getElementById("filter-month").addEventListener("change", (e) => { filters.month = e.target.value; renderTable(allLogs, isPrivileged); });
    document.getElementById("filter-department").addEventListener("change", (e) => { filters.department = e.target.value; renderTable(allLogs, isPrivileged); });
    if (isPrivileged) {
      document.getElementById("filter-employee").addEventListener("change", (e) => { filters.employee = e.target.value; renderTable(allLogs, isPrivileged); });
    }
    document.getElementById("btn-export-csv").addEventListener("click", () => exportCSV(allLogs, isPrivileged));

    renderTable(allLogs, isPrivileged);
  }

  function filteredLogs(allLogs) {
    return allLogs.filter(l => {
      if (filters.month !== "all" && Utils.monthKey(l.date) !== filters.month) return false;
      if (filters.department !== "all" && l.departmentKey !== filters.department) return false;
      if (filters.employee !== "all" && l.employeeId !== filters.employee) return false;
      return true;
    }).sort((a, b) => b.date.localeCompare(a.date));
  }

  function renderTable(allLogs, isPrivileged) {
    const logs = filteredLogs(allLogs);
    const area = document.getElementById("history-table-area");

    if (!logs.length) {
      area.innerHTML = `<div class="empty-state"><div class="empty-state__icon">&#128203;</div><h3>No entries match these filters</h3><p>Try a different month or department.</p></div>`;
      return;
    }

    area.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              ${isPrivileged ? "<th>Employee</th>" : ""}
              <th>Department</th>
              <th>Files done</th>
              <th>Productivity</th>
              <th>Working hrs</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${logs.map(l => `
              <tr>
                <td>${Utils.formatDateLong(l.date)}</td>
                ${isPrivileged ? `<td>${Utils.escapeHtml(l.employeeName)}</td>` : ""}
                <td><span class="dept-chip" style="--chip-bg:${Store.deptColor(l.departmentKey)}22;--chip-fg:${Store.deptColor(l.departmentKey)}"><span class="dept-chip__dot"></span>${Utils.escapeHtml(l.departmentName || "—")}</span></td>
                <td class="num">${l.totalFileDone ?? "—"}</td>
                <td class="num">${l.productivityPct !== null && l.productivityPct !== undefined ? l.productivityPct + "%" : "—"}</td>
                <td class="num">${Utils.minutesToHM(l.totalWorkingMinutes)}</td>
                <td>${statusChip(l.approvalStatus)}</td>
                <td><button class="btn btn--ghost btn--sm" data-log-id="${l.id}">View</button></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    `;

    area.querySelectorAll("button[data-log-id]").forEach(btn => {
      btn.addEventListener("click", () => showDetail(Store.getWorkLogById(btn.dataset.logId)));
    });
  }

  function statusChip(status) {
    const cls = status === "Approved" ? "approved" : status === "Rejected" ? "rejected" : "pending";
    return `<span class="status-chip status-chip--${cls}">${status}</span>`;
  }

  function showDetail(log) {
    if (!log) return;
    const dept = Store.getDepartmentByKey(log.departmentKey);
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal">
        <div class="modal__header">
          <h2>${Utils.escapeHtml(log.departmentName)} — ${Utils.formatDateLong(log.date)}</h2>
          <button class="modal__close">&times;</button>
        </div>
        <div class="modal__body">
          <div class="kv-row"><span class="kv-row__label">Employee</span><span class="kv-row__value">${Utils.escapeHtml(log.employeeName)}</span></div>
          <div class="kv-row"><span class="kv-row__label">Total File Done</span><span class="kv-row__value">${log.totalFileDone ?? "—"}</span></div>
          <div class="kv-row"><span class="kv-row__label">Productivity</span><span class="kv-row__value">${log.productivityPct !== null ? log.productivityPct + "%" : "—"}</span></div>
          <div class="kv-row"><span class="kv-row__label">Working hours</span><span class="kv-row__value">${Utils.minutesToHM(log.totalWorkingMinutes)}</span></div>
          <div class="kv-row"><span class="kv-row__label">Approval status</span><span class="kv-row__value">${log.approvalStatus}</span></div>
          <div class="divider"></div>
          <h3 style="margin-bottom:10px;">Task breakdown</h3>
          ${dept ? dept.fields.map(f => `
            <div class="kv-row"><span class="kv-row__label">${f.label}</span><span class="kv-row__value">${log.fields[f.id] ?? "—"}</span></div>
          `).join("") : "<p>No department schema found.</p>"}
        </div>
        <div class="modal__footer">
          <button class="btn btn--ghost" id="modal-close-btn">Close</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    const close = () => overlay.remove();
    overlay.querySelector(".modal__close").addEventListener("click", close);
    overlay.querySelector("#modal-close-btn").addEventListener("click", close);
    overlay.addEventListener("click", (e) => { if (e.target === overlay) close(); });
  }

  function exportCSV(allLogs, isPrivileged) {
    const logs = filteredLogs(allLogs);
    const rows = [["Date", "Employee", "EmployeeID", "Department", "Total File Done", "Productivity %", "Working Hours", "Approval Status"]];
    logs.forEach(l => {
      rows.push([l.date, l.employeeName, l.employeeId, l.departmentName, l.totalFileDone, l.productivityPct, Utils.minutesToHM(l.totalWorkingMinutes), l.approvalStatus]);
    });
    Utils.downloadCSV("coh_work_history.csv", rows);
    Toast.success("CSV exported.");
  }

  return { render };
})();

          <div class="content__eyebrow">Central Operations Hub</div>
          <h1>Manager Dashboard</h1>
          <p class="content__desc">${team.length} employee${team.length === 1 ? "" : "s"} · ${Utils.formatDateLong(Utils.todayISO())}</p>
        </div>
        <div style="display:flex; gap:10px;">
          <button class="btn btn--ghost" id="btn-add-employee">+ Add employee</button>

        </div>
      </div>

      <div class="stat-grid">
        <div class="stat-card stat-card--accent-brand">
          <div class="stat-card__label">Total team</div>
          <div class="stat-card__value num">${team.length}</div>
        </div>
        <div class="stat-card stat-card--accent-sage">
          <div class="stat-card__label">Present today</div>
          <div class="stat-card__value num">${present}</div>
        </div>
        <div class="stat-card stat-card--accent-rust">
          <div class="stat-card__label">Absent today</div>
          <div class="stat-card__value num">${absent}</div>
        </div>
        <div class="stat-card stat-card--accent-amber">
          <div class="stat-card__label">Pending approvals</div>
          <div class="stat-card__value num">${pendingCount}</div>
        </div>
        <div class="stat-card stat-card--accent-${avgProd === null ? 'amber' : Utils.productivityTone(avgProd)}">
          <div class="stat-card__label">Team avg productivity</div>
          <div class="stat-card__value num">${avgProd !== null ? avgProd + "%" : "—"}</div>
        </div>
      </div>

      <div style="display:grid; grid-template-columns: 1.4fr 1fr; gap:18px; margin-bottom:22px;" id="dashboard-grid">
        <div class="card card--pad">
          <h2 style="margin-bottom:4px;">Monthly trend</h2>
          <p class="content__desc" style="margin-bottom:16px;">Average daily productivity over the last 30 days.</p>
          <div id="trend-chart-area"></div>
        </div>

        <div class="card card--pad">
          <h2 style="margin-bottom:14px;">Top performers</h2>
          ${topPerformers.length ? `
            <div style="display:flex; flex-direction:column; gap:12px;">
              ${topPerformers.map((p, i) => `
                <div style="display:flex; align-items:center; gap:10px;">
                  <div style="width:22px; text-align:center; font-family:var(--font-mono); font-weight:700; color:var(--ink-soft);">${i + 1}</div>
                  <div class="avatar-circle">${Utils.initialsOf(p.employee.name)}</div>
                  <div style="flex:1; min-width:0;">
                    <div style="font-weight:600; font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${Utils.escapeHtml(p.employee.name)}</div>
                    <div style="font-size:11.5px; color:var(--ink-soft);">${
                    p.employee.departments && p.employee.departments.length > 1
                      ? p.employee.departments.join(", ")
                      : Utils.escapeHtml(p.employee.department || "—")
                  }</div>
                  </div>
                  <div class="num" style="font-weight:700; color:var(--${Utils.productivityTone(p.avg) === 'sage' ? 'sage' : Utils.productivityTone(p.avg) === 'amber' ? 'amber' : 'rust'});">${p.avg}%</div>
                </div>
              `).join("")}
            </div>
          ` : `<p style="color:var(--ink-soft); font-size:13px;">No productivity data yet this month.</p>`}
        </div>
      </div>

      <div class="card card--pad">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
          <h2>Team roster</h2>
          <span style="font-size:12px; color:var(--ink-soft);">EMP : ${team.length} &nbsp;·&nbsp; Present: ${present} &nbsp;·&nbsp; Absent: ${absent}</span>
        </div>
        ${renderRoster(team, teamLogs)}
      </div>

      <style>
        @media (max-width: 980px) { #dashboard-grid { grid-template-columns: 1fr; } }
      </style>
    `;

    document.getElementById("btn-add-employee").addEventListener("click", () => App.navigate("employees"));
    document.getElementById("btn-log-work").addEventListener("click", () => App.navigate("log-work"));

    renderTrendChart(teamLogs);
  }

  function computeTopPerformers(team, logs) {
    const thisMonth = Utils.monthKey(Utils.todayISO());
    const byEmp = {};
    logs.forEach(l => {
      if (Utils.monthKey(l.date) !== thisMonth) return;
      if (l.productivityPct === null || l.productivityPct === undefined) return;
      byEmp[l.employeeId] = byEmp[l.employeeId] || [];
      byEmp[l.employeeId].push(l.productivityPct);
    });
    const result = Object.entries(byEmp).map(([empId, vals]) => {
      const employee = team.find(e => e.id === empId);
      if (!employee) return null;
      const avg = Math.round((vals.reduce((s, v) => s + v, 0) / vals.length) * 10) / 10;
      return { employee, avg };
    }).filter(Boolean);
    result.sort((a, b) => b.avg - a.avg);
    return result.slice(0, 5);
  }

  function renderRoster(team, logs) {
    if (!team.length) {
      return `<div class="empty-state"><div class="empty-state__icon">&#128101;</div><h3>No team members yet</h3></div>`;
    }
    return `
      <div class="table-wrap">
        <table>
          <thead><tr><th></th><th>Name</th><th>GU ID</th><th>Designation</th><th>Departments</th><th>Status</th><th>Targets</th></tr></thead>
          <tbody>
            ${team.map(e => {
              const depts = e.departments || (e.department ? [e.department] : []);
              const targStr = Object.entries(e.departmentTargets || {}).map(([k,v]) => `${k.split(" ")[0]}: ${v}`).join(", ") || "—";
              return `
              <tr>
                <td><div class="avatar-circle">${Utils.initialsOf(e.name)}</div></td>
                <td>${Utils.escapeHtml(e.name)}</td>
                <td class="num">${e.id}</td>
                <td>${Utils.escapeHtml(e.designation || "—")}</td>
                <td style="max-width:220px;">
                  <div style="display:flex; flex-wrap:wrap; gap:3px;">
                    ${depts.map(dn => {
                      const d = Store.getDepartments().find(x => x.name === dn);
                      return `<span class="dept-chip" style="--chip-bg:${d?d.color:'#ccc'}22;--chip-fg:${d?d.color:'#666'};font-size:10px;"><span class="dept-chip__dot"></span>${Utils.escapeHtml(dn)}</span>`;
                    }).join("")}
                  </div>
                </td>
                <td>${e.isPresentToday ? '<span class="status-chip status-chip--approved">Present</span>' : '<span class="status-chip status-chip--rejected">Absent</span>'}</td>
                <td class="num" style="font-size:12px;">${targStr}</td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>
      </div>
    `;
  }

  function renderTrendChart(logs) {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - 30);
    const cutoffStr = cutoff.toISOString().slice(0, 10);

    const byDate = {};
    logs.forEach(l => {
      if (l.date < cutoffStr) return;
      if (l.productivityPct === null || l.productivityPct === undefined) return;
      byDate[l.date] = byDate[l.date] || [];
      byDate[l.date].push(l.productivityPct);
    });

    const dates = Object.keys(byDate).sort();
    const area = document.getElementById("trend-chart-area");

    if (!dates.length) {
      area.innerHTML = `<div class="empty-state" style="padding:30px;"><p>No productivity data in the last 30 days.</p></div>`;
      return;
    }

    const points = dates.map(d => ({
      date: d,
      avg: byDate[d].reduce((s, v) => s + v, 0) / byDate[d].length
    }));

    const w = 600, h = 200, pad = 28;
    const max = Math.max(100, ...points.map(p => p.avg));
    const stepX = points.length > 1 ? (w - pad * 2) / (points.length - 1) : 0;

    const coords = points.map((p, i) => {
      const x = pad + i * stepX;
      const y = h - pad - (p.avg / max) * (h - pad * 2);
      return { x, y, p };
    });

    const path = coords.map((c, i) => `${i === 0 ? "M" : "L"} ${c.x.toFixed(1)} ${c.y.toFixed(1)}`).join(" ");
    const areaPath = `${path} L ${coords[coords.length - 1].x.toFixed(1)} ${h - pad} L ${coords[0].x.toFixed(1)} ${h - pad} Z`;

    const dots = coords.map(c => `<circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="3" fill="var(--brand)"></circle>`).join("");
    const labels = coords.filter((_, i) => i % Math.ceil(coords.length / 6 || 1) === 0).map(c =>
      `<text x="${c.x.toFixed(1)}" y="${h - 6}" font-size="9" text-anchor="middle" fill="var(--ink-soft)" font-family="var(--font-mono)">${Utils.formatDateShort(c.p.date)}</text>`
    ).join("");

    area.innerHTML = `
      <svg viewBox="0 0 ${w} ${h}" style="width:100%; height:220px;" preserveAspectRatio="xMinYMin meet">
        <line x1="${pad}" y1="${h - pad}" x2="${w - pad}" y2="${h - pad}" stroke="var(--paper-line)" stroke-width="1"></line>
        <path d="${areaPath}" fill="var(--brand)" opacity="0.08"></path>
        <path d="${path}" fill="none" stroke="var(--brand)" stroke-width="2.2"></path>
        ${dots}
        ${labels}
      </svg>
    `;
  }

  return { render };
})();

const EmployeeManagementView = (() => {
