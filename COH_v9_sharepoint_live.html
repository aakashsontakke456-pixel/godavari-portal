  function render(container, user) {
    const all = Store.getEmployees();
    // Managers and Chief Managers see every live row from SharePoint.
    const list = all;

    container.innerHTML = `
      <div class="content__header">
        <div>
          <div class="content__eyebrow">Employee Management</div>
          <h1>All COH Employees</h1>
          <p class="content__desc">${list.length} employee${list.length === 1 ? "" : "s"} across all departments</p>
        </div>
        <div style="display:flex; gap:10px;">
          <button class="btn btn--ghost" id="toggle-view">${viewMode === "cards" ? "Table view" : "Card view"}</button>
          <button class="btn btn--primary" id="btn-add">+ Add Employee</button>
        </div>
      </div>

      <div id="employee-list-area"></div>
    `;

    document.getElementById("btn-add").addEventListener("click", () => openEmployeeModal(null, user));
    document.getElementById("toggle-view").addEventListener("click", () => {
      viewMode = viewMode === "cards" ? "table" : "cards";
      render(container, user);
    });

    renderList(list, user);
  }

  function renderList(list, user) {
    const area = document.getElementById("employee-list-area");
    if (!list.length) {
      area.innerHTML = `<div class="empty-state"><div class="empty-state__icon">&#128101;</div><h3>No employees yet</h3><p>Add your first team member to get started.</p></div>`;
      return;
    }

    if (viewMode === "table") {
      area.innerHTML = `
        <div class="card">
          <div class="table-wrap">
            <table>
              <thead><tr><th></th><th>Name</th><th>GU ID</th><th>Designation</th><th>Departments</th><th>Targets</th><th></th></tr></thead>
              <tbody>
                ${list.map(e => {
                  const depts = e.departments || (e.department ? [e.department] : []);
                  const targStr = Object.entries(e.departmentTargets || {}).map(([k,v]) => `${k.split(" ")[0]}: ${v}`).join(", ") || "—";
                  return `
                  <tr>
                    <td>
                      ${ (() => { const _src = e._photoBlobUrl || e.photoUrl; return _src
                        ? `<img src="${Utils.escapeHtml(_src)}" alt="${Utils.escapeHtml(e.name)}"
                             style="width:34px;height:34px;border-radius:50%;object-fit:cover;vertical-align:middle;border:1.5px solid var(--paper-line);"
                             onerror="this.style.display='none';this.nextElementSibling.style.display='inline-flex';">
                           <div class="avatar-circle" style="display:none;">${Utils.initialsOf(e.name)}</div>`
                        : `<div class="avatar-circle">${Utils.initialsOf(e.name)}</div>`; })() }
                    </td>
                    <td>${Utils.escapeHtml(e.name)}</td>
                    <td class="num">${e.id}</td>
                    <td>${Utils.escapeHtml(e.designation || "—")}</td>
                    <td style="max-width:200px;">
                      <div style="display:flex; flex-wrap:wrap; gap:4px;">
                        ${depts.map(dn => {
                          const d = Store.getDepartments().find(x => x.name === dn);
                          return `<span class="dept-chip" style="--chip-bg:${d?d.color:'#ccc'}22;--chip-fg:${d?d.color:'#666'};font-size:10.5px;"><span class="dept-chip__dot"></span>${Utils.escapeHtml(dn)}</span>`;
                        }).join("")}
                      </div>
                    </td>
                    <td style="font-size:12px; color:var(--ink-soft);">${targStr}</td>
                    <td style="display:flex; gap:6px;">
                      <button class="btn btn--ghost btn--sm" data-edit="${e.id}">Edit</button>
                      <button class="btn btn--danger btn--sm" data-delete="${e.id}">Delete</button>
                    </td>
                  </tr>`;
                }).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    } else {
      area.innerHTML = `
        <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap:16px;">
          ${list.map(e => {
            const depts = e.departments || (e.department ? [e.department] : []);
            const primaryDept = Store.getDepartmentByName(depts[0]);
            return `
            <div class="card card--pad" style="border-left:4px solid ${primaryDept ? primaryDept.color : '#ccc'};">
              <div style="display:flex; align-items:center; gap:12px; margin-bottom:14px;">
                ${ (() => { const _src = e._photoBlobUrl || e.photoUrl; return _src
                  ? `<img src="${Utils.escapeHtml(_src)}" alt="${Utils.escapeHtml(e.name)}"
                       style="width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid ${primaryDept ? primaryDept.color : '#ccc'};"
                       onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                     <div class="avatar-circle" style="width:46px;height:46px;font-size:15px;display:none;">${Utils.initialsOf(e.name)}</div>`
                  : `<div class="avatar-circle" style="width:46px;height:46px;font-size:15px;">${Utils.initialsOf(e.name)}</div>`; })() }
                <div style="flex:1; min-width:0;">
                  <div style="font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${Utils.escapeHtml(e.name)}</div>
                  <div style="font-size:12px; color:var(--ink-soft);">${Utils.escapeHtml(e.designation || "—")}</div>
                </div>
              </div>
              <div class="kv-row"><span class="kv-row__label">GU ID</span><span class="kv-row__value">${e.id}</span></div>
              <div class="kv-row" style="align-items:flex-start;">
                <span class="kv-row__label">Departments</span>
                <div style="display:flex; flex-wrap:wrap; gap:4px; justify-content:flex-end;">
                  ${depts.map(dn => {
                    const d = Store.getDepartments().find(x => x.name === dn);
                    return `<span class="dept-chip" style="--chip-bg:${d?d.color:'#ccc'}22;--chip-fg:${d?d.color:'#666'};font-size:10.5px;"><span class="dept-chip__dot"></span>${Utils.escapeHtml(dn)}</span>`;
                  }).join("")}
                </div>
              </div>
              <div class="kv-row">
                <span class="kv-row__label">Targets</span>
                <span class="kv-row__value" style="font-family:var(--font-body); font-weight:600; font-size:12px;">
                  ${Object.entries(e.departmentTargets || {}).map(([k,v]) => `${k.split(" ")[0]}: <strong>${v}</strong>`).join(" · ") || "—"}
                </span>
              </div>
              <div class="kv-row"><span class="kv-row__label">Status</span><span class="kv-row__value" style="font-family:var(--font-body);">${e.isPresentToday ? '<span class="status-chip status-chip--approved">Present</span>' : '<span class="status-chip status-chip--rejected">Absent</span>'}</span></div>
              <div style="display:flex; gap:8px; margin-top:14px;">
                <button class="btn btn--ghost btn--sm" style="flex:1;" data-edit="${e.id}">Edit</button>
                <button class="btn btn--danger btn--sm" style="flex:1;" data-delete="${e.id}">Delete</button>
              </div>
            </div>
          `}).join("")}
        </div>
      `;
    }

    area.querySelectorAll("[data-edit]").forEach(btn => {
      btn.addEventListener("click", () => openEmployeeModal(Store.getEmployeeById(btn.dataset.edit), user));
    });
    area.querySelectorAll("[data-delete]").forEach(btn => {
      btn.addEventListener("click", () => confirmDelete(btn.dataset.delete, user));
    });
  }

  function confirmDelete(empId, user) {
    const emp = Store.getEmployeeById(empId);
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal" style="max-width:420px;">
        <div class="modal__header"><h2>Remove employee?</h2><button class="modal__close">&times;</button></div>
        <div class="modal__body">
          <p>This will permanently remove <strong>${Utils.escapeHtml(emp.name)}</strong> (${emp.id}) from the roster. Their past work logs will remain in history.</p>
        </div>
        <div class="modal__footer">
          <button class="btn btn--ghost" id="cancel-delete">Cancel</button>
          <button class="btn btn--danger" id="confirm-delete">Delete employee</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    const close = () => overlay.remove();
    overlay.querySelector(".modal__close").addEventListener("click", close);
    overlay.querySelector("#cancel-delete").addEventListener("click", close);
    overlay.querySelector("#confirm-delete").addEventListener("click", async () => {
      const btn = overlay.querySelector("#confirm-delete");
      btn.disabled = true;
      btn.textContent = "Deleting…";
      try {
        await Store.deleteEmployee(empId);
        Toast.success("Employee removed from SharePoint.");
        close();
        App.refresh();
      } catch (err) {
        Toast.error("Delete failed: " + err.message);
        btn.disabled = false;
        btn.textContent = "Delete employee";
      }
    });
  }

  function openEmployeeModal(emp, user) {
    const isEdit = !!emp;
    const departments = Store.getDepartments();
    const assignedDepts = isEdit ? (emp.departments || (emp.department ? [emp.department] : [])) : [];
    const deptTargets = isEdit ? (emp.departmentTargets || {}) : {};
    let selectedPhotoDataUrl = "";
    let photoRemoved = false;

    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal" style="max-width:680px;">
        <div class="modal__header">
          <h2>${isEdit ? "Edit employee" : "Add employee"}</h2>
          <button class="modal__close">&times;</button>
        </div>
        <div class="modal__body">
          <form id="employee-form" autocomplete="off">
            <div class="card--pad" style="background:var(--brand-tint); border-radius:var(--radius-md); padding:14px 16px; margin-bottom:16px;">
              <div style="display:flex; gap:16px; align-items:flex-start; flex-wrap:wrap;">
                <div>
                  <div class="field__label" style="margin-bottom:8px;">Employee photo</div>
                  <canvas id="ef-photo-canvas" width="160" height="160"
                    style="width:112px;height:112px;border-radius:50%;background:var(--paper);border:2px solid var(--paper-line);display:block;"></canvas>
                </div>
                <div style="flex:1; min-width:240px;">
                  <input type="file" id="ef-photo-file" accept="image/png,image/jpeg,image/webp" style="margin-bottom:10px;">
                  <div id="ef-photo-tools" style="display:none; gap:10px; grid-template-columns:1fr 1fr; margin-bottom:8px;">
                    <label style="font-size:12px;color:var(--ink-soft);">Zoom
                      <input type="range" id="ef-photo-zoom" min="1" max="3" step="0.05" value="1" style="width:100%;">
                    </label>
                    <label style="font-size:12px;color:var(--ink-soft);">Vertical
                      <input type="range" id="ef-photo-y" min="-80" max="80" step="1" value="0" style="width:100%;">
                    </label>
                  </div>
                  <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                    <button type="button" class="btn btn--ghost btn--sm" id="ef-photo-clear">Remove photo</button>
                    <span style="font-size:12px;color:var(--ink-soft);">Choose a photo, adjust crop, then save employee.</span>
                  </div>
                </div>
              </div>
            </div>

            <div class="field-grid">
              <div class="field">
                <label class="field__label">Full name<span class="req">*</span></label>
                <input type="text" id="ef-name" value="${isEdit ? Utils.escapeHtml(emp.name) : ""}" required>
              </div>
              <div class="field">
                <label class="field__label">GU ID${isEdit ? "" : ' <span class="req">*</span>'}</label>
                <input type="text" id="ef-id" value="${isEdit ? emp.id : Store.nextEmployeeNumericId()}" ${isEdit ? "readonly style='opacity:0.7;'" : ""}>
              </div>
              <div class="field">
                <label class="field__label">Password<span class="req">*</span></label>
                <input type="text" id="ef-password" value="${isEdit ? Utils.escapeHtml(emp.password) : ""}" required>
              </div>
              <div class="field">
                <label class="field__label">Designation</label>
                <input type="text" id="ef-designation" value="${isEdit ? Utils.escapeHtml(emp.designation || "") : ""}" placeholder="e.g. OFFICER">
              </div>
              <div class="field">
                <label class="field__label">Role</label>
                <select id="ef-role">
                  <option value="Employee" ${!isEdit || emp.role === "Employee" ? "selected" : ""}>Employee</option>
                  <option value="Manager" ${isEdit && emp.role === "Manager" ? "selected" : ""}>Manager</option>
                  <option value="Chief Manager" ${isEdit && emp.role === "Chief Manager" ? "selected" : ""}>Chief Manager</option>
                </select>
              </div>
              <div class="field">
                <label class="field__label">Present today?</label>
                <select id="ef-present">
                  <option value="true" ${!isEdit || emp.isPresentToday ? "selected" : ""}>Present</option>
                  <option value="false" ${isEdit && !emp.isPresentToday ? "selected" : ""}>Absent</option>
                </select>
              </div>
            </div>

            <div class="divider"></div>

            <div class="field">
              <label class="field__label">Assign Departments<span class="req">*</span></label>
              <p style="font-size:12px; color:var(--ink-soft); margin:0 0 8px;">Select one or more departments. Each can have an optional daily target count.</p>
              <div class="multi-dept-select" id="dept-checkboxes">
                ${departments.map(d => `
                  <label class="multi-dept-check">
                    <input type="checkbox" class="dept-chk" value="${Utils.escapeHtml(d.name)}" ${assignedDepts.includes(d.name) ? "checked" : ""}>
                    <span class="dept-chip" style="--chip-bg:${d.color}22;--chip-fg:${d.color}"><span class="dept-chip__dot"></span>${Utils.escapeHtml(d.name)}</span>
                  </label>
                `).join("")}
              </div>
            </div>

            <div id="dept-targets-area" style="margin-top:12px;"></div>
          </form>
        </div>
        <div class="modal__footer">
          <button class="btn btn--ghost" id="ef-cancel">Cancel</button>
          <button class="btn btn--primary" id="ef-save">${isEdit ? "Save changes" : "Add employee"}</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    const close = () => overlay.remove();
    overlay.querySelector(".modal__close").addEventListener("click", close);
    overlay.querySelector("#ef-cancel").addEventListener("click", close);
    overlay.addEventListener("click", (e) => { if (e.target === overlay) close(); });

    const canvas = overlay.querySelector("#ef-photo-canvas");
    const ctx = canvas.getContext("2d");
    const photoImg = new Image();
    let photoReady = false;
    let cropExportEnabled = false;

    function drawInitialsPhoto() {
      const name = overlay.querySelector("#ef-name")?.value || (isEdit ? emp.name : "");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#E8F0EC";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#0D3B34";
      ctx.font = "700 42px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(Utils.initialsOf(name), canvas.width / 2, canvas.height / 2);
    }

    function drawPhotoCrop() {
      if (!photoReady) { drawInitialsPhoto(); return; }
      const zoom = parseFloat(overlay.querySelector("#ef-photo-zoom").value || "1");
      const offsetY = parseFloat(overlay.querySelector("#ef-photo-y").value || "0");
      const size = canvas.width;
      ctx.clearRect(0, 0, size, size);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, size, size);
      const baseScale = Math.max(size / photoImg.width, size / photoImg.height);
      const scale = baseScale * zoom;
      const w = photoImg.width * scale;
      const h = photoImg.height * scale;
      const x = (size - w) / 2;
      const y = (size - h) / 2 + offsetY;
      ctx.drawImage(photoImg, x, y, w, h);
      if (cropExportEnabled) {
        try { selectedPhotoDataUrl = canvas.toDataURL("image/jpeg", 0.82); }
        catch (_) { selectedPhotoDataUrl = ""; }
      }
    }

    function loadPreview(src, allowCrop) {
      photoImg.onload = () => {
        photoReady = true;
        cropExportEnabled = allowCrop;
        overlay.querySelector("#ef-photo-tools").style.display = allowCrop ? "grid" : "none";
        drawPhotoCrop();
      };
      photoImg.onerror = () => {
        photoReady = false;
        cropExportEnabled = false;
        selectedPhotoDataUrl = "";
        drawInitialsPhoto();
      };
      photoImg.src = src;
    }

    if (isEdit && emp.photoUrl) loadPreview(emp._photoBlobUrl || emp.photoUrl, false);
    else drawInitialsPhoto();

    overlay.querySelector("#ef-name").addEventListener("input", () => {
      if (!photoReady) drawInitialsPhoto();
    });
    overlay.querySelector("#ef-photo-file").addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      if (!/^image\//.test(file.type)) { Toast.error("Please choose an image file."); return; }
      const reader = new FileReader();
      reader.onload = () => {
        photoRemoved = false;
        overlay.querySelector("#ef-photo-zoom").value = "1";
        overlay.querySelector("#ef-photo-y").value = "0";
        loadPreview(reader.result, true);
      };
      reader.readAsDataURL(file);
    });
    overlay.querySelector("#ef-photo-zoom").addEventListener("input", drawPhotoCrop);
    overlay.querySelector("#ef-photo-y").addEventListener("input", drawPhotoCrop);
    overlay.querySelector("#ef-photo-clear").addEventListener("click", () => {
      photoReady = false;
      cropExportEnabled = false;
      selectedPhotoDataUrl = "";
      photoRemoved = true;
      overlay.querySelector("#ef-photo-file").value = "";
      overlay.querySelector("#ef-photo-tools").style.display = "none";
      drawInitialsPhoto();
    });

    // Render per-dept target inputs
    function renderTargetInputs() {
      const checked = [...overlay.querySelectorAll(".dept-chk:checked")].map(cb => cb.value);
      const area = overlay.querySelector("#dept-targets-area");
      if (!checked.length) { area.innerHTML = ""; return; }
      area.innerHTML = `
        <div class="dept-target-grid">
          <div style="font-size:12px; font-weight:700; color:var(--ink-soft); letter-spacing:0.04em; text-transform:uppercase; margin-bottom:4px;">Daily Target per Department <span style="font-weight:400;">(optional)</span></div>
          ${checked.map(dName => {
            const d = Store.getDepartments().find(x => x.name === dName);
            const color = d ? d.color : '#ccc';
            return `
            <div class="dept-target-row">
              <label><span style="display:inline-block; width:9px; height:9px; border-radius:50%; background:${color}; margin-right:6px;"></span>${Utils.escapeHtml(dName)}</label>
              <input type="number" min="0" step="1" class="dept-target-input" data-dept="${Utils.escapeHtml(dName)}"
                value="${deptTargets[dName] !== undefined ? deptTargets[dName] : ""}"
                placeholder="e.g. 50">
            </div>`;
          }).join("")}
        </div>
      `;
      // Keep deptTargets in sync as user types
      area.querySelectorAll(".dept-target-input").forEach(inp => {
        inp.addEventListener("input", () => {
          if (inp.value) deptTargets[inp.dataset.dept] = parseInt(inp.value, 10);
          else delete deptTargets[inp.dataset.dept];
        });
      });
    }

    overlay.querySelectorAll(".dept-chk").forEach(cb => {
      cb.addEventListener("change", renderTargetInputs);
    });
    renderTargetInputs();

    overlay.querySelector("#ef-save").addEventListener("click", async () => {
      const name = document.getElementById("ef-name").value.trim();
      const id = document.getElementById("ef-id").value.trim().toUpperCase();
      const password = document.getElementById("ef-password").value.trim();
      if (!name || !id || !password) { Toast.error("Name, GU ID and Password are required."); return; }
      if (!isEdit && Store.getEmployeeById(id)) { Toast.error("That GU ID already exists."); return; }

      const selectedDepts = [...overlay.querySelectorAll(".dept-chk:checked")].map(cb => cb.value);
      if (!selectedDepts.length) { Toast.error("Please assign at least one department."); return; }

      // Collect final targets from inputs
      const finalTargets = {};
      overlay.querySelectorAll(".dept-target-input").forEach(inp => {
        if (inp.value) finalTargets[inp.dataset.dept] = parseInt(inp.value, 10);
      });

      // Legacy compat fields
      const primaryDept = selectedDepts[0];
      const legacyTarget = finalTargets[primaryDept] || null;
      const legacyCashTarget = finalTargets["Cash Verification"] || null;

      const record = {
        id,
        name,
        password,
        designation: document.getElementById("ef-designation").value.trim(),
        department: primaryDept,
        departments: selectedDepts,
        departmentTargets: finalTargets,
        role: document.getElementById("ef-role").value,
        targetCount: legacyTarget,
        targetCountCashVerification: legacyCashTarget,
        isPresentToday: document.getElementById("ef-present").value === "true",
        attendanceStatus: document.getElementById("ef-present").value === "true" ? "Present" : "Absent",
        lastLoginDate: isEdit ? emp.lastLoginDate : "",
        photoInitials: Utils.initialsOf(name)
      };

      if (isEdit && emp.spId) record.spId = emp.spId;
      if (selectedPhotoDataUrl) record.photoUrl = selectedPhotoDataUrl;
      else if (isEdit && emp.photoUrl && !photoRemoved) record.photoUrl = emp.photoUrl;
      else record.photoUrl = "";

      const saveBtn = overlay.querySelector("#ef-save");
      saveBtn.disabled = true;
      saveBtn.textContent = "Saving…";
      try {
        await Store.saveEmployee(record);
        Toast.success(isEdit ? "Employee updated in SharePoint." : "Employee added to SharePoint.");
        close();
        App.refresh();
      } catch (err) {
        Toast.error("Save failed: " + err.message);
        saveBtn.disabled = false;
        saveBtn.textContent = isEdit ? "Save changes" : "Add employee";
      }
    });
  }

  return { render };
})();

/* ===========================================================
   COH OPS — Approvals
   =========================================================== */

const ApprovalsView = (() => {

  let selectedIds = new Set();

  function render(container, user) {
    const isChief = user.role === "Chief Manager";
    const allLogs = Store.getWorkLogs();
    // COH managers see all employees across all departments
    const team = Store.getEmployees().filter(e => e.role !== "Manager" && e.role !== "Chief Manager");
    const teamIds = new Set(team.map(e => e.id));

    const pending = allLogs.filter(l => l.approvalStatus === "Pending" && teamIds.has(l.employeeId))
      .sort((a, b) => b.date.localeCompare(a.date));

    selectedIds = new Set([...selectedIds].filter(id => pending.some(p => p.id === id)));

    container.innerHTML = `
      <div class="content__header">
        <div>
          <div class="content__eyebrow">Approvals</div>
          <h1>Pending work logs</h1>
          <p class="content__desc">${pending.length} entr${pending.length === 1 ? "y" : "ies"} awaiting your review.</p>
        </div>
        <div style="display:flex; gap:10px;">
          <button class="btn btn--ghost" id="btn-select-all">${selectedIds.size === pending.length && pending.length > 0 ? "Deselect all" : "Select all"}</button>
          <button class="btn btn--sage" id="btn-bulk-approve" ${selectedIds.size === 0 ? "disabled" : ""}>Approve selected (${selectedIds.size})</button>
        </div>
      </div>

      <div id="approvals-list"></div>
    `;

    document.getElementById("btn-select-all").addEventListener("click", () => {
      if (selectedIds.size === pending.length) {
        selectedIds.clear();
      } else {
        pending.forEach(p => selectedIds.add(p.id));
      }
      render(container, user);
    });

    document.getElementById("btn-bulk-approve").addEventListener("click", async () => {
      if (selectedIds.size === 0) return;
      const count = selectedIds.size;
      try {
        await Store.bulkApprove([...selectedIds]);
        Toast.success(`Approved ${count} entr${count === 1 ? "y" : "ies"} in SharePoint.`);
        selectedIds.clear();
        App.refresh();
      } catch (err) {
        Toast.error("Approval failed: " + err.message);
      }
    });

    renderList(pending, container, user);
  }

  function renderList(pending, container, user) {
    const area = document.getElementById("approvals-list");
    if (!pending.length) {
      area.innerHTML = `<div class="empty-state"><div class="empty-state__icon">&#10003;</div><h3>All caught up</h3><p>There are no pending work logs to review.</p></div>`;

            </div>
            <div style="display:flex; gap:18px; font-size:12.5px; color:var(--ink-soft);">
              <span>Files done: <strong class="num" style="color:var(--ink);">${l.totalFileDone ?? "—"}</strong></span>
              <span>Productivity: <strong class="num" style="color:var(--ink);">${l.productivityPct !== null && l.productivityPct !== undefined ? l.productivityPct + "%" : "—"}</strong></span>
              <span>Working hrs: <strong class="num" style="color:var(--ink);">${Utils.minutesToHM(l.totalWorkingMinutes)}</strong></span>

          </div>
          <div style="display:flex; gap:8px; flex-shrink:0;">
            <button class="btn btn--ghost btn--sm" data-view="${l.id}">View</button>

            <button class="btn btn--sage btn--sm" data-approve="${l.id}">Approve</button>
          </div>
        </div>

    }).join("");

    area.querySelectorAll("[data-select]").forEach(cb => {
      cb.addEventListener("change", () => {

        else selectedIds.delete(cb.dataset.select);
        render(container, user);
      });
    });
    area.querySelectorAll("[data-approve]").forEach(btn => {
      btn.addEventListener("click", async () => {
        try {
          await Store.setApprovalStatus(btn.dataset.approve, "Approved");
          Toast.success("Entry approved in SharePoint.");
          App.refresh();
        } catch (err) {
          Toast.error("Approval failed: " + err.message);
        }
      });
    });
    area.querySelectorAll("[data-reject]").forEach(btn => {
      btn.addEventListener("click", async () => {
        try {
          await Store.setApprovalStatus(btn.dataset.reject, "Rejected");
          Toast.info("Entry rejected in SharePoint.");
          App.refresh();
        } catch (err) {
          Toast.error("Rejection failed: " + err.message);
        }
      });
    });
    area.querySelectorAll("[data-view]").forEach(btn => {
      btn.addEventListener("click", () => showDetail(Store.getWorkLogById(btn.dataset.view)));
    });
  }

  function showDetail(log) {
    if (!log) return;
    const dept = Store.getDepartmentByKey(log.departmentKey);
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal">
        <div class="modal__header">
          <h2>${Utils.escapeHtml(log.departmentName)} — ${Utils.formatDateLong(log.date)}</h2>
          <button class="modal__close">&times;</button>
        </div>
        <div class="modal__body">
          <div class="kv-row"><span class="kv-row__label">Employee</span><span class="kv-row__value">${Utils.escapeHtml(log.employeeName)}</span></div>
          <div class="kv-row"><span class="kv-row__label">Total File Done</span><span class="kv-row__value">${log.totalFileDone ?? "—"}</span></div>
          <div class="kv-row"><span class="kv-row__label">Productivity</span><span class="kv-row__value">${log.productivityPct !== null ? log.productivityPct + "%" : "—"}</span></div>
          <div class="kv-row"><span class="kv-row__label">Working hours</span><span class="kv-row__value">${Utils.minutesToHM(log.totalWorkingMinutes)}</span></div>
          <div class="divider"></div>
          <h3 style="margin-bottom:10px;">Task breakdown</h3>
          ${dept ? dept.fields.map(f => `
            <div class="kv-row"><span class="kv-row__label">${f.label}</span><span class="kv-row__value">${log.fields[f.id] ?? "—"}</span></div>
          `).join("") : "<p>No schema found.</p>"}
        </div>
        <div class="modal__footer">
          <button class="btn btn--ghost" id="modal-close-btn">Close</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    const close = () => overlay.remove();
    overlay.querySelector(".modal__close").addEventListener("click", close);
    overlay.querySelector("#modal-close-btn").addEventListener("click", close);
    overlay.addEventListener("click", (e) => { if (e.target === overlay) close(); });
  }

  return { render };
})();


// =====================================================================
// VIEW: CHIEF DASHBOARD (Org Overview) — Enhanced with Daily/Weekly/Monthly/Quarterly periods
// =====================================================================
const ChiefDashboardView = (() => {

  // Fiscal year starts April 1 for Indian multi-state societies / cooperative banks
  const FISCAL_YEAR_START_MONTH = 3; // 0-indexed → April

  let activePeriod = "daily"; // daily | weekly | monthly | quarterly

  /* ---- Period helpers ---- */
  function getPeriodBounds(period) {
    const today = new Date();
    const todayStr = Utils.todayISO();
    let from, to, label;

    if (period === "daily") {
      from = todayStr; to = todayStr;
      label = "Today · " + Utils.formatDateLong(todayStr);
    } else if (period === "weekly") {
      // Week: Monday–Sunday
      const dow = today.getDay(); // 0=Sun
      const diffToMon = dow === 0 ? 6 : dow - 1;
      const mon = new Date(today); mon.setDate(today.getDate() - diffToMon);
      const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
      from = mon.toISOString().slice(0, 10);
      to   = sun.toISOString().slice(0, 10);
      label = "This Week · " + fmtShortDate(mon) + " – " + fmtShortDate(sun);
    } else if (period === "monthly") {
      const y = today.getFullYear(), m = today.getMonth();
      from = `${y}-${String(m + 1).padStart(2, "0")}-01`;
      const lastDay = new Date(y, m + 1, 0).getDate();
      to   = `${y}-${String(m + 1).padStart(2, "0")}-${lastDay}`;
      label = "This Month · " + today.toLocaleString("en-IN", { month: "long", year: "numeric" });
    } else { // quarterly
      // Q = April-Jun | Jul-Sep | Oct-Dec | Jan-Mar
      const m = today.getMonth(); // 0-indexed
      const fiscalM = (m - FISCAL_YEAR_START_MONTH + 12) % 12; // months since April
      const qIdx = Math.floor(fiscalM / 3); // 0-3
      const qStart = (FISCAL_YEAR_START_MONTH + qIdx * 3) % 12;
      const qStartYear = m < FISCAL_YEAR_START_MONTH
        ? today.getFullYear() - 1 + (qStart < FISCAL_YEAR_START_MONTH ? 1 : 0)
        : today.getFullYear() + (qStart < FISCAL_YEAR_START_MONTH ? 1 : 0);
      const qEndM = (qStart + 2) % 12;
      const qEndYear = qEndM < qStart ? qStartYear + 1 : qStartYear;
      const lastDayQ = new Date(qEndYear, qEndM + 1, 0).getDate();
      from = `${qStartYear}-${String(qStart + 1).padStart(2, "0")}-01`;
      to   = `${qEndYear}-${String(qEndM + 1).padStart(2, "0")}-${lastDayQ}`;
      const qNames = ["Q1 (Apr–Jun)", "Q2 (Jul–Sep)", "Q3 (Oct–Dec)", "Q4 (Jan–Mar)"];
      label = `FY Quarter · ${qNames[qIdx]}`;
    }
    return { from, to, label };
  }

  function fmtShortDate(d) {
    return d.toLocaleString("en-IN", { day: "numeric", month: "short" });
  }

  function logsInPeriod(allLogs, from, to) {
    return allLogs.filter(l => l.date >= from && l.date <= to);
  }

  /* ---- Main render ---- */
  function render(container, user) {
    const allEmployees = Store.getEmployees();
    const allLogs = Store.getWorkLogs();
    const depts = Store.getDepartments();
    const deptTargets = Store.getDeptTargets();
    const pending = allLogs.filter(l => l.approvalStatus === "Pending").length;
    const present = allEmployees.filter(e => e.isPresentToday).length;

    const { from, to, label } = getPeriodBounds(activePeriod);
    const periodLogs = logsInPeriod(allLogs, from, to);

    const totalFiles = periodLogs.reduce((s, l) => s + (l.totalFileDone || 0), 0);
    const validProd = periodLogs.filter(l => l.productivityPct !== null && l.productivityPct !== undefined);
    const avgProd = validProd.length ? Math.round(validProd.reduce((s, l) => s + l.productivityPct, 0) / validProd.length * 10) / 10 : null;

    // Multiplier for target comparison
    const periodMultiplier = activePeriod === "daily" ? (1/22) : activePeriod === "weekly" ? (1/4.33) : activePeriod === "quarterly" ? 3 : 1;

    // Per-dept summary
    const deptStats = depts.map(d => {
      const dLogs = periodLogs.filter(l => l.departmentKey === d.key);
      const dEmp = allEmployees.filter(e => (e.departments || [e.department]).includes(d.name));
      const dFiles = dLogs.reduce((s, l) => s + (l.totalFileDone || 0), 0);
      const dValidProd = dLogs.filter(l => l.productivityPct !== null && l.productivityPct !== undefined);
      const dAvgProd = dValidProd.length ? Math.round(dValidProd.reduce((s, l) => s + l.productivityPct, 0) / dValidProd.length * 10) / 10 : null;
      const orgMonthlyTarget = deptTargets[d.key] || null;
      const periodTarget = orgMonthlyTarget ? Math.round(orgMonthlyTarget * periodMultiplier) : null;
      const progressPct = periodTarget ? Math.min(100, Math.round((dFiles / periodTarget) * 100)) : null;
      // Trend: compare to previous same period
      const prevFiles = getPrevPeriodFiles(allLogs, d.key);
      return { dept: d, empCount: dEmp.length, files: dFiles, avgProd: dAvgProd, periodTarget, progressPct, logCount: dLogs.length, prevFiles };
    }).filter(s => s.empCount > 0 || s.logCount > 0);

    // Top 5 performers in period
    const topPerformers = computeTopPerformers(allEmployees, periodLogs);

    // Daily trend data for chart (last 14 days regardless of period view)
    const trendLabel = activePeriod === "daily" ? "Today's dept breakdown" :
                       activePeriod === "weekly" ? "This week's daily trend" :
                       activePeriod === "monthly" ? "Last 30 days trend" : "Quarterly daily trend";

    container.innerHTML = `
      <!-- Fiscal Period banner -->
      <div style="background:var(--brand); color:#fff; border-radius:var(--radius-md); padding:12px 20px; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;">
        <div>
          <div style="font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; opacity:.75;">Godavari Urban Co-operative Bank · Chief Manager View</div>

        ${[

        ].map(p => `

            style="padding:9px 20px; border-radius:7px; border:none; cursor:pointer; font-size:13.5px; font-weight:700; transition:all .15s;
              background:${activePeriod === p.key ? "var(--brand)" : "transparent"};
              color:${activePeriod === p.key ? "#fff" : "var(--ink-soft)"};">
            ${p.icon} ${p.label}
          </button>
        `).join("")}
      </div>

      <!-- KPI stat grid -->
      <div class="stat-grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); margin-bottom:22px;">
        <div class="stat-card stat-card--accent-brand">
          <div class="stat-card__label">Total Staff</div>
          <div class="stat-card__value num">${allEmployees.length}</div>
          <div class="stat-card__hint">${deptStats.length} active depts</div>
        </div>
        <div class="stat-card stat-card--accent-sage">
          <div class="stat-card__label">Present Today</div>
          <div class="stat-card__value num">${present}</div>
          <div class="stat-card__hint">${allEmployees.length - present} absent</div>
        </div>
        <div class="stat-card stat-card--accent-brand">
          <div class="stat-card__label">Files ${periodLabel()}</div>
          <div class="stat-card__value num">${totalFiles}</div>
          <div class="stat-card__hint">${periodLogs.length} log entries</div>
        </div>
        <div class="stat-card stat-card--accent-${avgProd === null ? 'amber' : Utils.productivityTone(avgProd)}">
          <div class="stat-card__label">Org Avg Productivity</div>
          <div class="stat-card__value num">${avgProd !== null ? avgProd + "%" : "—"}</div>
          <div class="stat-card__hint">All depts combined</div>
        </div>
        <div class="stat-card stat-card--accent-amber">
          <div class="stat-card__label">Pending Approvals</div>
          <div class="stat-card__value num">${pending}</div>
          <div class="stat-card__hint">Across all depts</div>
        </div>
      </div>

      <!-- Main grid: Trend chart + Top performers -->
      <div style="display:grid; grid-template-columns:1.5fr 1fr; gap:18px; margin-bottom:22px;" id="chief-main-grid">
        <div class="card card--pad">
          <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px;">
            <div>
              <h2 style="font-size:17px; margin-bottom:2px;">${trendLabel}</h2>
              <p style="font-size:12.5px; color:var(--ink-soft); margin:0;">Files done · ${label}</p>
            </div>
          </div>
          <div id="chief-trend-chart"></div>
        </div>

        <div class="card card--pad">
          <h2 style="font-size:17px; margin-bottom:16px;">🏆 Top Performers <span style="font-size:12px; font-weight:400; color:var(--ink-soft);">${periodLabel()}</span></h2>
          ${topPerformers.length ? `
            <div style="display:flex; flex-direction:column; gap:13px;">
              ${topPerformers.map((p, i) => {
                const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `<span style="font-family:var(--font-mono);font-weight:700;color:var(--ink-soft);">${i+1}</span>`;
                const tone = Utils.productivityTone(p.avg);
                const toneColor = tone === "sage" ? "var(--sage)" : tone === "amber" ? "var(--amber)" : "var(--rust)";
                return `

                  <div style="width:24px; text-align:center; font-size:16px;">${medal}</div>
                  <div class="avatar-circle">${Utils.initialsOf(p.employee.name)}</div>
                  <div style="flex:1; min-width:0;">
                    <div style="font-weight:700; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${Utils.escapeHtml(p.employee.name)}</div>
                    <div style="font-size:11px; color:var(--ink-soft);">${Utils.escapeHtml(p.employee.department || "—")}</div>
                  </div>
                  <div style="text-align:right;">
                    <div style="font-weight:800; font-size:15px; color:${toneColor}; font-family:var(--font-mono);">${p.avg}%</div>
                    <div style="font-size:10px; color:var(--ink-soft);">${p.files} files</div>

            </div>
          ` : `<div class="empty-state" style="padding:20px;"><div class="empty-state__icon">📊</div><p>No productivity data for this period.</p></div>`}

      <!-- Dept-wise summary with period targets -->
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">

      <div class="card card--pad" style="margin-bottom:22px;">

          <h2 style="font-size:17px;">All Departments — Summary Table</h2>

                <th>Staff</th>
                <th>Files (${periodLabel()})</th>
                <th>${activePeriod === "quarterly" ? "Quarterly" : activePeriod === "monthly" ? "Monthly" : activePeriod === "weekly" ? "Weekly" : "Daily"} Target</th>
                <th>Progress</th>
                <th>Avg Productivity</th>
                <th>Entries</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${deptStats.map(s => {
                const tone = s.avgProd === null ? "amber" : Utils.productivityTone(s.avgProd);
                const toneColor = tone === "sage" ? "var(--sage)" : tone === "amber" ? "var(--amber)" : "var(--rust)";
                const prog = s.progressPct;
                const progColor = prog === null ? "var(--ink-soft)" : prog >= 80 ? "var(--sage)" : prog >= 50 ? "var(--amber)" : "var(--rust)";
                return `
                <tr style="cursor:pointer;" data-drill-dept="${s.dept.key}">
                  <td>
                    <div style="display:flex; align-items:center; gap:8px;">
                      <div style="width:8px;height:8px;border-radius:50%;background:${s.dept.color};flex-shrink:0;"></div>
                      <span style="font-weight:600;">${Utils.escapeHtml(s.dept.name)}</span>
                    </div>
                  </td>
                  <td class="num">${s.empCount}</td>
                  <td class="num" style="font-weight:700;">${s.files}</td>
                  <td class="num">${s.periodTarget !== null ? s.periodTarget : "—"}</td>
                  <td style="min-width:140px;">
                    ${prog !== null ? `
                      <div style="display:flex; align-items:center; gap:8px;">
                        <div class="progress-bar" style="flex:1;"><div class="progress-bar__fill" style="width:${prog}%;background:${progColor};"></div></div>
                        <span style="font-size:11px;font-family:var(--font-mono);font-weight:700;color:${progColor};">${prog}%</span>
                      </div>` : `<span style="color:var(--ink-soft);font-size:12px;">No target</span>`}
                  </td>
                  <td class="num" style="font-weight:700; color:${toneColor};">${s.avgProd !== null ? s.avgProd + "%" : "—"}</td>
                  <td class="num">${s.logCount}</td>
                  <td><button class="btn btn--ghost btn--sm">View →</button></td>
                </tr>`;
              }).join("")}
            </tbody>
          </table>
        </div>
      </div>

      <style>
        @media (max-width: 980px) { #chief-main-grid { grid-template-columns: 1fr; } }

    `;

    // Period tab switch
    container.querySelectorAll(".chief-period-btn").forEach(btn => {

    renderTrendChart(allLogs, from, to);
  }

  function periodLabel() {
    return activePeriod === "daily" ? "Today" : activePeriod === "weekly" ? "This Week" : activePeriod === "monthly" ? "This Month" : "This Quarter";
  }

  function getPrevPeriodFiles(allLogs, deptKey) {
    const today = new Date();
    let from2, to2;
    if (activePeriod === "daily") {
      const prev = new Date(today); prev.setDate(today.getDate() - 1);
      from2 = to2 = prev.toISOString().slice(0, 10);
    } else if (activePeriod === "weekly") {
      const dow = today.getDay();
      const diffToMon = dow === 0 ? 6 : dow - 1;
      const thisMon = new Date(today); thisMon.setDate(today.getDate() - diffToMon);
      const prevMon = new Date(thisMon); prevMon.setDate(thisMon.getDate() - 7);
      const prevSun = new Date(prevMon); prevSun.setDate(prevMon.getDate() + 6);
      from2 = prevMon.toISOString().slice(0, 10);
      to2   = prevSun.toISOString().slice(0, 10);
    } else if (activePeriod === "monthly") {
      const y = today.getFullYear(), m = today.getMonth();
      const pm = m === 0 ? 11 : m - 1, py = m === 0 ? y - 1 : y;
      const lastDay = new Date(py, pm + 1, 0).getDate();
      from2 = `${py}-${String(pm + 1).padStart(2, "0")}-01`;
      to2   = `${py}-${String(pm + 1).padStart(2, "0")}-${lastDay}`;
    } else {
      return null;
    }
    return allLogs.filter(l => l.departmentKey === deptKey && l.date >= from2 && l.date <= to2)
                  .reduce((s, l) => s + (l.totalFileDone || 0), 0);
  }

  function computeTopPerformers(allEmployees, periodLogs) {
    const byEmp = {};
    periodLogs.forEach(l => {
      if (l.productivityPct === null || l.productivityPct === undefined) return;
      byEmp[l.employeeId] = byEmp[l.employeeId] || { prods: [], files: 0 };
      byEmp[l.employeeId].prods.push(l.productivityPct);
      byEmp[l.employeeId].files += (l.totalFileDone || 0);
    });
    return Object.entries(byEmp).map(([id, d]) => {
      const employee = allEmployees.find(e => e.id === id);
      if (!employee) return null;
      const avg = Math.round((d.prods.reduce((s, v) => s + v, 0) / d.prods.length) * 10) / 10;
      return { employee, avg, files: d.files };
    }).filter(Boolean).sort((a, b) => b.avg - a.avg).slice(0, 5);
  }

  function renderDeptCard(s) {
    const tone = s.avgProd === null ? "amber" : Utils.productivityTone(s.avgProd);
    const toneColor = tone === "sage" ? "var(--sage)" : tone === "amber" ? "var(--amber)" : "var(--rust)";
    const trendArrow = s.prevFiles === null ? "" :
      s.files > s.prevFiles ? `<span style="color:var(--sage);font-size:12px;"> ▲ ${s.files - s.prevFiles}</span>` :
      s.files < s.prevFiles ? `<span style="color:var(--rust);font-size:12px;"> ▼ ${s.prevFiles - s.files}</span>` :
      `<span style="color:var(--ink-soft);font-size:12px;"> — same</span>`;

    return `
      <div class="card card--pad" data-drill-dept="${s.dept.key}"
        style="border-left:4px solid ${s.dept.color}; cursor:pointer; transition:box-shadow 0.15s;"
        onmouseover="this.style.boxShadow='var(--shadow-pop)'" onmouseout="this.style.boxShadow=''">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:14px;">
          <div style="width:10px; height:10px; border-radius:50%; background:${s.dept.color}; flex-shrink:0;"></div>
          <div style="font-weight:700; font-size:14px; flex:1;">${Utils.escapeHtml(s.dept.name)}</div>
          <div style="font-size:11px; color:var(--ink-soft);">${s.empCount} staff</div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px;">
          <div style="background:var(--paper); border-radius:6px; padding:10px 12px;">
            <div style="font-size:10.5px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.04em;">Files ${periodLabel()}</div>
            <div style="font-size:22px; font-weight:700; font-family:var(--font-mono); margin-top:2px;">${s.files}${trendArrow}</div>
            ${s.periodTarget !== null ? `<div style="font-size:11px; color:var(--ink-soft);">Target: ${s.periodTarget}</div>` : `<div style="font-size:11px; color:var(--ink-soft);">No target set</div>`}
          </div>
          <div style="background:var(--paper); border-radius:6px; padding:10px 12px;">
            <div style="font-size:10.5px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.04em;">Avg Productivity</div>
            <div style="font-size:22px; font-weight:700; font-family:var(--font-mono); color:${toneColor}; margin-top:2px;">${s.avgProd !== null ? s.avgProd + "%" : "—"}</div>
            <div style="font-size:11px; color:var(--ink-soft);">${s.logCount} log${s.logCount === 1 ? "" : "s"}</div>
          </div>
        </div>
        ${s.progressPct !== null ? `
          <div style="margin-bottom:6px;">
            <div style="display:flex; justify-content:space-between; font-size:11.5px; color:var(--ink-soft); margin-bottom:4px;">
              <span>${periodLabel()} target progress</span>
              <span style="font-weight:700; color:${s.progressPct >= 80 ? 'var(--sage)' : s.progressPct >= 50 ? 'var(--amber)' : 'var(--rust)'};">${s.progressPct}%</span>
            </div>
            <div class="progress-bar"><div class="progress-bar__fill" style="width:${s.progressPct}%; background:${s.progressPct >= 80 ? 'var(--sage)' : s.progressPct >= 50 ? 'var(--amber)' : 'var(--rust)'};"></div></div>
          </div>
        ` : ""}
        <div style="font-size:11.5px; color:var(--brand); font-weight:600; margin-top:8px;">View employee breakdown →</div>
      </div>
    `;
  }

  function renderTrendChart(allLogs, from, to) {
    const area = document.getElementById("chief-trend-chart");
    if (!area) return;

    // For daily: show dept breakdown bar chart
    // For weekly/monthly/quarterly: show day-by-day line of total files
    if (activePeriod === "daily") {
      // Bar chart: each dept's files today
      const depts = Store.getDepartments();
      const dayLogs = allLogs.filter(l => l.date === from);
      const deptFiles = depts.map(d => ({
        name: d.name.length > 14 ? d.name.slice(0, 12) + "…" : d.name,
        color: d.color,
        files: dayLogs.filter(l => l.departmentKey === d.key).reduce((s, l) => s + (l.totalFileDone || 0), 0)
      })).filter(d => d.files > 0);

      if (!deptFiles.length) {
        area.innerHTML = `<div class="empty-state" style="padding:30px;"><p>No logs submitted today yet.</p></div>`;
        return;
      }

      const w = 600, h = 200, topPad = 20, botPad = 50, sidePad = 10;
      const maxVal = Math.max(1, ...deptFiles.map(d => d.files));
      const barW = Math.floor((w - sidePad * 2 - (deptFiles.length - 1) * 6) / deptFiles.length);
      const bars = deptFiles.map((d, i) => {
        const barH = Math.max(4, (d.files / maxVal) * (h - topPad - botPad));
        const x = sidePad + i * (barW + 6);
        const y = h - botPad - barH;
        return `
          <rect x="${x}" y="${y}" width="${barW}" height="${barH}" rx="3" fill="${d.color}" opacity=".85"></rect>
          <text x="${x + barW / 2}" y="${y - 4}" font-size="11" text-anchor="middle" fill="var(--ink)" font-family="var(--font-mono)" font-weight="700">${d.files}</text>
          <text x="${x + barW / 2}" y="${h - 6}" font-size="8.5" text-anchor="middle" fill="var(--ink-soft)" font-family="var(--font-body)">${d.name}</text>
        `;
      }).join("");

      area.innerHTML = `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:220px;" preserveAspectRatio="xMinYMin meet">${bars}</svg>`;

    } else {
      // Line chart: day-by-day total files in the period
      const dayMap = {};
      allLogs.filter(l => l.date >= from && l.date <= to).forEach(l => {
        dayMap[l.date] = (dayMap[l.date] || 0) + (l.totalFileDone || 0);
      });
      const dates = Object.keys(dayMap).sort();

      if (!dates.length) {
        area.innerHTML = `<div class="empty-state" style="padding:30px;"><p>No data for this period.</p></div>`;
        return;
      }

      const points = dates.map(d => ({ date: d, val: dayMap[d] }));
      const w = 600, h = 200, pad = 30;
      const maxV = Math.max(1, ...points.map(p => p.val));
      const stepX = points.length > 1 ? (w - pad * 2) / (points.length - 1) : 0;
      const coords = points.map((p, i) => ({
        x: pad + i * stepX,
        y: h - pad - (p.val / maxV) * (h - pad * 2),
        p
      }));
      const path = coords.map((c, i) => `${i === 0 ? "M" : "L"} ${c.x.toFixed(1)} ${c.y.toFixed(1)}`).join(" ");
      const areaPath = `${path} L ${coords[coords.length - 1].x.toFixed(1)} ${h - pad} L ${coords[0].x.toFixed(1)} ${h - pad} Z`;
      const dots = coords.map(c => `<circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="3.5" fill="var(--brand)"></circle>`).join("");
      const step = Math.ceil(coords.length / 7) || 1;
      const labels = coords.filter((_, i) => i % step === 0).map(c =>
        `<text x="${c.x.toFixed(1)}" y="${h - 6}" font-size="9" text-anchor="middle" fill="var(--ink-soft)" font-family="var(--font-mono)">${Utils.formatDateShort(c.p.date)}</text>`
      ).join("");
      const valLabels = coords.filter((_, i) => i % step === 0).map(c =>
        `<text x="${c.x.toFixed(1)}" y="${Math.max(14, c.y - 6)}" font-size="10" text-anchor="middle" fill="var(--ink)" font-family="var(--font-mono)" font-weight="700">${c.p.val}</text>`
      ).join("");

      area.innerHTML = `
        <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:220px;" preserveAspectRatio="xMinYMin meet">
          <line x1="${pad}" y1="${h - pad}" x2="${w - pad}" y2="${h - pad}" stroke="var(--paper-line)" stroke-width="1"></line>
          <path d="${areaPath}" fill="var(--brand)" opacity="0.07"></path>
          <path d="${path}" fill="none" stroke="var(--brand)" stroke-width="2.2"></path>
          ${dots}${valLabels}${labels}
        </svg>
      `;
    }
  }

  function exportChiefCSV(periodLogs, label) {
    const rows = [["Period", "Date", "Employee", "EmployeeID", "Department", "Files Done", "Productivity %", "Working Hours", "Status"]];
    periodLogs.sort((a, b) => b.date.localeCompare(a.date)).forEach(l => {
      rows.push([label, l.date, l.employeeName, l.employeeId, l.departmentName, l.totalFileDone, l.productivityPct, Utils.minutesToHM(l.totalWorkingMinutes), l.approvalStatus]);
    });
    Utils.downloadCSV(`coh_chief_${activePeriod}_report.csv`, rows);
    Toast.success("CSV exported.");
  }

  return { render };
})();

// VIEW: DEPT ANALYTICS (Chief Manager drill-down)
// =====================================================================
const DeptAnalyticsView = (() => {

  let selectedDeptKey = null;
  let selectedEmpId = "all";

  function render(container, user, params) {
    if (params && params.deptKey) selectedDeptKey = params.deptKey;
    const depts = Store.getDepartments();
    const allLogs = Store.getWorkLogs();
    const allEmployees = Store.getEmployees();
    const deptTargets = Store.getDeptTargets();

    if (!selectedDeptKey) selectedDeptKey = depts[0].key;
    const dept = Store.getDepartmentByKey(selectedDeptKey);

    const deptEmployees = allEmployees.filter(e =>
      (e.departments || [e.department]).includes(dept ? dept.name : "")
    );
    const deptLogs = allLogs.filter(l => l.departmentKey === selectedDeptKey);
    const thisMonth = Utils.monthKey(Utils.todayISO());

    container.innerHTML = `
      <div class="content__header">
        <div>
          <div class="content__eyebrow">Dept Analytics</div>
          <h1>Department Performance</h1>
        </div>
      </div>

      <div class="card card--pad" style="margin-bottom:18px;">
        <div style="display:flex; gap:16px; flex-wrap:wrap; align-items:flex-end;">
          <div class="field" style="margin-bottom:0; min-width:220px;">
            <label class="field__label">Department</label>
            <select id="da-dept-select">
              ${depts.map(d => `<option value="${d.key}" ${d.key === selectedDeptKey ? "selected" : ""}>${d.name}</option>`).join("")}
            </select>
          </div>
          <div class="field" style="margin-bottom:0; min-width:200px;">
            <label class="field__label">Employee</label>
            <select id="da-emp-select">
              <option value="all">All employees</option>
              ${deptEmployees.map(e => `<option value="${e.id}" ${e.id === selectedEmpId ? "selected" : ""}>${Utils.escapeHtml(e.name)}</option>`).join("")}
            </select>
          </div>
        </div>
      </div>

      <div id="da-content"></div>
    `;

    document.getElementById("da-dept-select").addEventListener("change", e => {
      selectedDeptKey = e.target.value;
      selectedEmpId = "all";
      render(container, user, {});
    });
    document.getElementById("da-emp-select").addEventListener("change", e => {
      selectedEmpId = e.target.value;
      renderAnalytics(container, dept, deptEmployees, deptLogs, deptTargets, thisMonth);
    });

    renderAnalytics(container, dept, deptEmployees, deptLogs, deptTargets, thisMonth);
  }

  function renderAnalytics(container, dept, deptEmployees, deptLogs, deptTargets, thisMonth) {
    const area = document.getElementById("da-content");
    const filteredLogs = selectedEmpId === "all" ? deptLogs : deptLogs.filter(l => l.employeeId === selectedEmpId);
    const monthLogs = filteredLogs.filter(l => Utils.monthKey(l.date) === thisMonth);
    const orgTarget = dept ? (deptTargets[dept.key] || null) : null;

    const totalFiles = monthLogs.reduce((s, l) => s + (l.totalFileDone || 0), 0);
    const validProd = monthLogs.filter(l => l.productivityPct !== null && l.productivityPct !== undefined);
    const avgProd = validProd.length ? Math.round(validProd.reduce((s, l) => s + l.productivityPct, 0) / validProd.length * 10) / 10 : null;
    const progressPct = orgTarget ? Math.min(100, Math.round((totalFiles / orgTarget) * 100)) : null;

    // Employee summary table (only when showing all)
    const empRows = selectedEmpId === "all" ? deptEmployees.map(emp => {
      const eLogs = monthLogs.filter(l => l.employeeId === emp.id);
      const eFiles = eLogs.reduce((s, l) => s + (l.totalFileDone || 0), 0);
      const eValidProd = eLogs.filter(l => l.productivityPct !== null && l.productivityPct !== undefined);
      const eAvgProd = eValidProd.length ? Math.round(eValidProd.reduce((s, l) => s + l.productivityPct, 0) / eValidProd.length * 10) / 10 : null;
      const empDeptTarget = emp.departmentTargets ? (emp.departmentTargets[dept ? dept.name : ""] || null) : null;
      const eProg = empDeptTarget ? Math.min(100, Math.round((eFiles / empDeptTarget) * 100)) : null;
      return { emp, eFiles, eAvgProd, empDeptTarget, eProg, logCount: eLogs.length };
    }) : [];

    area.innerHTML = `
      <div class="stat-grid" style="margin-bottom:20px;">
        <div class="stat-card stat-card--accent-brand">
          <div class="stat-card__label">${selectedEmpId === "all" ? "Dept" : "Employee"} files (month)</div>
          <div class="stat-card__value num">${totalFiles}</div>
          ${orgTarget && selectedEmpId === "all" ? `<div class="stat-card__hint">Org target: ${orgTarget}</div>` : ""}
        </div>
        <div class="stat-card stat-card--accent-${avgProd === null ? 'amber' : Utils.productivityTone(avgProd)}">
          <div class="stat-card__label">Avg productivity</div>
          <div class="stat-card__value num">${avgProd !== null ? avgProd + "%" : "—"}</div>
          <div class="stat-card__hint">${validProd.length} log${validProd.length === 1 ? "" : "s"}</div>
        </div>
        <div class="stat-card stat-card--accent-brand">
          <div class="stat-card__label">Entries (month)</div>
          <div class="stat-card__value num">${monthLogs.length}</div>
        </div>
        ${progressPct !== null && selectedEmpId === "all" ? `
        <div class="stat-card stat-card--accent-${progressPct >= 80 ? 'sage' : progressPct >= 50 ? 'amber' : 'rust'}">
          <div class="stat-card__label">Monthly target %</div>
          <div class="stat-card__value num">${progressPct}%</div>
          <div class="stat-card__hint">Target: ${orgTarget}</div>
        </div>` : ""}
      </div>

      ${selectedEmpId === "all" && empRows.length ? `
      <div class="card card--pad" style="margin-bottom:20px;">
        <h2 style="margin-bottom:14px;">Employee Breakdown — ${Utils.escapeHtml(dept ? dept.name : "")}</h2>
        <div class="table-wrap">
          <table>
            <thead><tr><th></th><th>Employee</th><th>GU ID</th><th>Files (month)</th><th>Avg Productivity</th><th>Emp Target</th><th>Progress</th><th>Entries</th></tr></thead>
            <tbody>
              ${empRows.map(r => {
                const tone = r.eAvgProd === null ? "amber" : Utils.productivityTone(r.eAvgProd);
                const toneColor = tone === "sage" ? "var(--sage)" : tone === "amber" ? "var(--amber)" : "var(--rust)";
                return `
                <tr style="cursor:pointer;" onclick="document.getElementById('da-emp-select').value='${r.emp.id}'; document.getElementById('da-emp-select').dispatchEvent(new Event('change'))">
                  <td><div class="avatar-circle">${Utils.initialsOf(r.emp.name)}</div></td>
                  <td style="font-weight:600;">${Utils.escapeHtml(r.emp.name)}</td>
                  <td class="num">${r.emp.id}</td>
                  <td class="num">${r.eFiles}</td>
                  <td class="num" style="color:${toneColor}; font-weight:700;">${r.eAvgProd !== null ? r.eAvgProd + "%" : "—"}</td>
                  <td class="num">${r.empDeptTarget || "—"}</td>
                  <td style="min-width:120px;">
                    ${r.eProg !== null ? `
                      <div style="display:flex; align-items:center; gap:8px;">
                        <div class="progress-bar" style="flex:1;"><div class="progress-bar__fill" style="width:${r.eProg}%; background:${r.eProg >= 80 ? 'var(--sage)' : r.eProg >= 50 ? 'var(--amber)' : 'var(--rust)'};"></div></div>
                        <span style="font-size:11px; font-family:var(--font-mono); font-weight:700;">${r.eProg}%</span>
                      </div>` : `<span style="color:var(--ink-soft); font-size:12px;">No target</span>`}
                  </td>
                  <td class="num">${r.logCount}</td>
                </tr>`;
              }).join("")}
            </tbody>
          </table>
        </div>
      </div>` : ""}

      <div class="card card--pad">
        <h2 style="margin-bottom:14px;">Recent Logs — ${selectedEmpId === "all" ? Utils.escapeHtml(dept ? dept.name : "") : Utils.escapeHtml(Store.getEmployeeById(selectedEmpId)?.name || "")}</h2>
        ${filteredLogs.length ? `
        <div class="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Employee</th><th>Files Done</th><th>Productivity</th><th>Working Hrs</th><th>Status</th></tr></thead>
            <tbody>
              ${filteredLogs.slice(0, 30).map(l => `
              <tr>
                <td>${Utils.formatDateLong(l.date)}</td>
                <td>${Utils.escapeHtml(l.employeeName)}</td>
                <td class="num">${l.totalFileDone ?? "—"}</td>
                <td class="num" style="font-weight:700; color:${l.productivityPct !== null ? (l.productivityPct >= 80 ? 'var(--sage)' : l.productivityPct >= 50 ? 'var(--amber)' : 'var(--rust)') : 'var(--ink-soft)'};">${l.productivityPct !== null ? l.productivityPct + "%" : "—"}</td>
                <td class="num">${Utils.minutesToHM(l.totalWorkingMinutes)}</td>
                <td><span class="status-chip status-chip--${l.approvalStatus === 'Approved' ? 'approved' : l.approvalStatus === 'Rejected' ? 'rejected' : 'pending'}">${l.approvalStatus}</span></td>
              </tr>`).join("")}
            </tbody>
          </table>
        </div>` : `<div class="empty-state" style="padding:30px;"><div class="empty-state__icon">&#128202;</div><h3>No logs for this selection</h3></div>`}
      </div>
    `;
  }

  return { render };
})();

const AdminSettingsView = (() => {

  function render(container, user) {
    const depts = Store.getDepartments();
    const deptTargets = Store.getDeptTargets();
    const taskRules = Store.getTaskTimeRules();

    container.innerHTML = `
      <div class="content__header">
        <div>
          <div class="content__eyebrow">Admin Settings</div>
          <h1>Organisation Configuration</h1>
          <p class="content__desc">Set department targets and task time rules used for productivity and working-hours calculation.</p>
        </div>
      </div>

      <div class="card card--pad" style="margin-bottom:22px;">
        <h2 style="margin-bottom:6px;">Monthly Department Targets</h2>
        <p style="font-size:13px; color:var(--ink-soft); margin-bottom:18px;">Set the expected total files per department per month. Used to track departmental progress on the Org Dashboard.</p>
        <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:12px;" id="dept-target-settings">
          ${depts.map(d => {
            const current = deptTargets[d.key] || "";
            return `
            <div class="card card--pad" style="border-left:4px solid ${d.color}; padding:14px 16px;">
              <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
                <div style="width:9px; height:9px; border-radius:50%; background:${d.color};"></div>
                <div style="font-weight:700; font-size:13.5px;">${Utils.escapeHtml(d.name)}</div>
              </div>
              <div style="display:flex; gap:8px; align-items:center;">
                <input type="number" min="0" step="1" class="dept-target-admin-input" data-key="${d.key}"
                  value="${current}" placeholder="Monthly target…"
                  style="flex:1; padding:8px 10px; font-size:13px;">
                <button class="btn btn--primary btn--sm dept-target-save-btn" data-key="${d.key}">Save</button>
                ${current ? `<button class="btn btn--ghost btn--sm dept-target-clear-btn" data-key="${d.key}" title="Clear">✕</button>` : ""}
              </div>
              ${current ? `<div style="font-size:11.5px; color:var(--sage); margin-top:6px; font-weight:600;">Current: ${current} files/month</div>` : `<div style="font-size:11.5px; color:var(--ink-soft); margin-top:6px;">Not set</div>`}
            </div>`;
          }).join("")}
        </div>
      </div>

      <div class="card card--pad" style="margin-bottom:22px;">
        <h2 style="margin-bottom:6px;">Task Time Rules</h2>
        <p style="font-size:13px; color:var(--ink-soft); margin-bottom:18px;">Set minutes per file or task unit. Working hours are calculated as task count multiplied by these minutes, then shown as HH:MM.</p>
        <div style="display:flex; flex-direction:column; gap:14px;">
          ${depts.map(d => `
            <div class="card card--pad" style="border-left:4px solid ${d.color}; padding:14px 16px;">
              <div style="display:flex; align-items:center; gap:8px; margin-bottom:12px;">
                <div style="width:9px; height:9px; border-radius:50%; background:${d.color};"></div>
                <div style="font-weight:800; font-size:14px;">${Utils.escapeHtml(d.name)}</div>
              </div>
              <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:10px;">
                ${d.fields.filter(f => f.type === "number").map(f => {
                  const current = taskRules[d.key] && taskRules[d.key][f.id] !== undefined ? taskRules[d.key][f.id] : "";
                  return `
                    <div style="display:flex; align-items:center; gap:8px; border:1px solid var(--paper-line); border-radius:6px; padding:8px 10px;">
                      <label style="flex:1; min-width:0; font-size:12.5px; color:var(--ink-soft); font-weight:650;">${Utils.escapeHtml(f.label)}</label>
                      <input type="number" min="0" step="0.5" class="task-time-rule-input" data-dept="${d.key}" data-field="${f.id}"
                        value="${current}" placeholder="min" style="width:78px; padding:7px 8px; font-size:13px;">
                    </div>`;
                }).join("")}
              </div>
            </div>
          `).join("")}
        </div>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:16px;">
          <button class="btn btn--ghost" id="btn-clear-task-rules">Clear all task rules</button>
          <button class="btn btn--primary" id="btn-save-task-rules">Save task rules</button>
        </div>
      </div>

      <div class="card card--pad" style="margin-bottom:22px;">
        <h2 style="margin-bottom:6px;">Data Management</h2>
        <p style="font-size:13px; color:var(--ink-soft); margin-bottom:16px;">Danger zone — these actions affect all data in the app.</p>
        <div style="display:flex; gap:12px; flex-wrap:wrap;">
          <button class="btn btn--ghost" id="btn-export-all">&#8681; Export all logs CSV</button>
          <button class="btn btn--danger" id="btn-reset-data">Reset to seed data</button>
        </div>
      </div>
    `;

    // Save handlers
    container.querySelectorAll(".dept-target-save-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const key = btn.dataset.key;
        const val = parseInt(container.querySelector(`.dept-target-admin-input[data-key="${key}"]`).value, 10);
        if (isNaN(val) || val <= 0) { Toast.error("Enter a valid number greater than 0."); return; }
        Store.saveDeptTarget(key, val);
        Toast.success("Target saved.");
        render(container, user);
      });
    });

    container.querySelectorAll(".dept-target-clear-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        Store.deleteDeptTarget(btn.dataset.key);
        Toast.info("Target cleared.");
        render(container, user);
      });
    });

    document.getElementById("btn-save-task-rules").addEventListener("click", () => {
      container.querySelectorAll(".task-time-rule-input").forEach(input => {
        const raw = input.value.trim();
        if (!raw) {
          Store.deleteTaskTimeRule(input.dataset.dept, input.dataset.field);
          return;
        }
        const val = parseFloat(raw);
        if (!isNaN(val) && val >= 0) Store.saveTaskTimeRule(input.dataset.dept, input.dataset.field, val);
      });
      Toast.success("Task time rules saved.");
      render(container, user);
    });

    document.getElementById("btn-clear-task-rules").addEventListener("click", () => {
      container.querySelectorAll(".task-time-rule-input").forEach(input => {
        Store.deleteTaskTimeRule(input.dataset.dept, input.dataset.field);
      });
      Toast.info("Task time rules cleared.");
      render(container, user);
    });

    document.getElementById("btn-export-all").addEventListener("click", () => {
      const logs = Store.getWorkLogs();
      const rows = [["Date","Employee","EmployeeID","Department","Files Done","Productivity %","Working Hours","Status"]];
      logs.forEach(l => rows.push([l.date, l.employeeName, l.employeeId, l.departmentName, l.totalFileDone, l.productivityPct, Utils.minutesToHM(l.totalWorkingMinutes), l.approvalStatus]));
      Utils.downloadCSV("coh_all_logs.csv", rows);
      Toast.success("CSV exported.");
    });

    document.getElementById("btn-reset-data").addEventListener("click", () => {
      const overlay = document.createElement("div");
      overlay.className = "modal-overlay";
      overlay.innerHTML = `
        <div class="modal" style="max-width:420px;">
          <div class="modal__header"><h2>Reset all data?</h2><button class="modal__close">&times;</button></div>
          <div class="modal__body"><p>This will <strong>permanently delete</strong> all employees, work logs, and targets and restore the original seed data. This cannot be undone.</p></div>
          <div class="modal__footer">
            <button class="btn btn--ghost" id="cancel-reset">Cancel</button>
            <button class="btn btn--danger" id="confirm-reset">Yes, reset everything</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      const close = () => overlay.remove();
      overlay.querySelector(".modal__close").addEventListener("click", close);
      overlay.querySelector("#cancel-reset").addEventListener("click", close);
      overlay.querySelector("#confirm-reset").addEventListener("click", () => {
        Store.resetToSeed();
        Toast.info("Data reset to seed.");
        close();
        App.boot();
      });
    });
  }

  return { render };
})();

    { key: "log-work", label: "Log Work", icon: "&#9998;" },
    { key: "history", label: "Work History", icon: "&#128203;" }
  ];

  const CHIEF_NAV = [
    { key: "chief-dashboard", label: "Org Overview", icon: "&#9737;" },
    { key: "dept-analytics", label: "Dept Analytics", icon: "&#128202;" },
    { key: "employees", label: "Employee Management", icon: "&#128101;" },

  ];

  let state = {
    route: "dashboard",
    routeParams: {}
  };
  let liveSyncTimer = null;
  let liveSyncInFlight = false;

  function navFor(role) {
    if (role === "Admin") return ADMIN_NAV;
    if (role === "Manager") return MANAGER_NAV;
    if (role === "Chief Manager") return CHIEF_NAV;
    return EMPLOYEE_NAV;
  }

  function defaultRouteFor(role) {
    if (role === "Admin") return "admin-settings";
    if (role === "Chief Manager") return "chief-dashboard";
    if (role === "Manager") return "manager-dashboard";
    return "dashboard";
  }

  function startLiveSync() {
    stopLiveSync();
    liveSyncTimer = setInterval(async () => {
      if (liveSyncInFlight || !Store.currentUser()) return;
      if (document.querySelector(".modal-overlay")) return;
      liveSyncInFlight = true;
      try {
        await Store.refreshFromSP();
        SPConnection.setStatus("live");
        if (Store.currentUser()) {
          // Do NOT re-render the shell if the user is actively filling in the log-work form.
          // Re-rendering would wipe their in-progress field values.
          // Instead, only update the connection badge and non-form parts of the UI.
          const isOnLogWork = state.route === "log-work";
          const hasFormData = isOnLogWork && document.querySelector(".dept-field-input");
          if (hasFormData) {
            // Just update the connection badge status silently — don't touch the form
            SPConnection.setStatus("live");
          } else {
            renderShell();
          }
        }
      } catch (err) {
        SPConnection.setStatus("offline");
        console.warn("Live SharePoint refresh failed:", err.message);
      } finally {
        liveSyncInFlight = false;
      }
    }, 30000);
  }

  function stopLiveSync() {
    if (liveSyncTimer) clearInterval(liveSyncTimer);
    liveSyncTimer = null;
    liveSyncInFlight = false;
  }

          <div>
            <div class="topbar__title">Central Operations Hub</div>
            <div class="topbar__sub">Daily Productivity Register</div>
          </div>
          <div class="topbar__spacer"></div>
          <div id="sp-connection-badge" class="sp-badge sp-badge--checking">
            <span class="sp-badge__dot" style="background:#D98E3A"></span>
            <span class="sp-badge__text">Connecting to SharePoint…</span>
          </div>
          <button class="sp-refresh-btn" id="btn-sp-refresh" title="Refresh from SharePoint">⟳</button>
          <div class="topbar__clock" id="topbar-clock">${Utils.formatDateLong(Utils.todayISO())}<br>${Utils.nowTime()}</div>
          
          <div class="topbar__user">
            ${userPhotoSrc
              ? `<img class="topbar__avatar" src="${Utils.escapeHtml(userPhotoSrc)}" alt="${Utils.escapeHtml(user.name)}" style="object-fit:cover;" onerror="this.outerHTML='<div class=&quot;topbar__avatar&quot;>${Utils.initialsOf(user.name)}</div>';">`
              : `<div class="topbar__avatar">${Utils.initialsOf(user.name)}</div>`}
            <div>
              <div class="topbar__user-name">${Utils.escapeHtml(user.name)}</div>
              <div class="topbar__user-role">${Utils.escapeHtml(user.role)} · ${Utils.escapeHtml(user.id)}</div>
            </div>
          </div>
        </header>

        <div class="main">
          <nav class="sidebar">
            <div class="sidebar__nav-scroll">
              <div class="sidebar__section-label">Navigate</div>
              ${nav.map(item => `
                <div class="nav-item ${state.route === item.key ? "active" : ""}" data-route="${item.key}">
                  <span class="nav-item__icon">${item.icon}</span>
                  <span>${item.label}</span>
                  ${item.key === "approvals" && pendingCount > 0 ? `<span class="nav-item__badge">${pendingCount}</span>` : ""}
                </div>
              `).join("")}
            </div>
            <div class="sidebar__bottom">
              ${(() => {
                if (!MSALAuth.isLoggedIn()) return "";
                const acct = MSALAuth.getAccount();
                const email = acct && acct.username ? acct.username : "";
                if (!email) return "";
                return `
                  <div style="padding:8px 12px;margin-bottom:6px;font-size:11px;color:var(--ink-soft);
                    line-height:1.4;border-top:1px solid var(--paper-line);padding-top:10px;">
                    <div style="font-weight:600;color:var(--ink);">Microsoft 365</div>

          <main class="content" id="content"></main>
        </div>
      </div>
    `;
    SPConnection.setStatus(SPConnection.getStatus());

    document.getElementById("btn-logout").addEventListener("click", handleLogout);
    document.querySelectorAll(".nav-item").forEach(el => {
      el.addEventListener("click", () => navigate(el.dataset.route));
    });

    const refreshBtn = document.getElementById("btn-sp-refresh");
    if (refreshBtn) {
      refreshBtn.addEventListener("click", async () => {
        refreshBtn.style.opacity = "0.4";
        refreshBtn.disabled = true;
        try {
          await Store.refreshFromSP();
          Toast.success("Refreshed from SharePoint.");
          // Don't wipe the log-work form if user has started filling it in
          const isOnLogWork = state.route === "log-work";
          const hasFormData = isOnLogWork && document.querySelector(".dept-field-input");
          if (!hasFormData) renderShell();
        } catch (e) {
          Toast.error("Could not reach SharePoint.");
        } finally {
          refreshBtn.style.opacity = "";
          refreshBtn.disabled = false;
        }
      });
    }

    // Re-render employee cards once profile photos load as blob URLs
    document.addEventListener("coh:photosLoaded", () => {
      if (state.route === "employees") renderContent(user);
    });

    renderContent(user);
  }

  function renderContent(user) {
    const container = document.getElementById("content");
    switch (state.route) {
      case "dashboard":
        EmployeeDashboardView.render(container, user);
        break;
      case "log-work":
        LogWorkView.render(container, user, state.routeParams);
        break;
      case "history":
        HistoryView.render(container, user);
        break;
      case "manager-dashboard":
        ManagerDashboardView.render(container, user);
        break;
      case "chief-dashboard":
        ChiefDashboardView.render(container, user);
        break;
      case "dept-analytics":
        DeptAnalyticsView.render(container, user, state.routeParams);
        break;
      case "admin-settings":
        if (user.role === "Admin") {
          AdminSettingsView.render(container, user);
        } else {
          container.innerHTML = `<div class="empty-state"><div class="empty-state__icon">&#9881;</div><h3>Admin access required</h3><p>Please sign out and use the separate Admin login.</p></div>`;
        }
        break;
      case "employees":
        EmployeeManagementView.render(container, user);
        break;
      case "approvals":
        ApprovalsView.render(container, user);
        break;
      default:
        container.innerHTML = `<div class="empty-state"><div class="empty-state__icon">&#128203;</div><h3>Not found</h3></div>`;
    }
  }

  function handleLogout() {
    stopLiveSync();
    Store.clearSession();
    Toast.info("Signed out.");
    LoginView.render();
  }

  function refresh() {
    renderShell();
  }

  return { boot, navigate, refresh };
})();

document.addEventListener("DOMContentLoaded", async () => {
  await App.boot();
});

</script>
</body>
</html>
