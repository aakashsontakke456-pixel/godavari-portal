<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <!-- MSAL redirect handler — this page must be hosted at the registered redirectUri -->
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.28.0/lib/msal-browser.min.js"></script>
</head>
<body>
  <script>
    // This blank page handles the OAuth2 popup redirect for MSAL v3.
    // It reads the auth code/token from the URL and passes it back to the opener window.
    (async () => {
      try {
        const msalInstance = new msal.PublicClientApplication({
          auth: {
            clientId: "106f2386-db75-436c-8e08-21c2ea14958e",
            authority: "https://login.microsoftonline.com/e47e4128-1c1b-4510-a440-415145dc1cde",
            redirectUri: window.location.href.split('?')[0].split('#')[0]
          },
          cache: { cacheLocation: "sessionStorage", storeAuthStateInCookie: true }
        });
        await msalInstance.initialize();
        await msalInstance.handleRedirectPromise();
      } catch(e) {
        // Errors are handled by the opener — just close if something goes wrong
      }
      // The popup closes itself automatically after MSAL processes the response
    })();
  </script>
</body>
</html>
